<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primordial Utterance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section {
            margin-bottom: 32px;
        }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button {
            margin-bottom: 0;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        .color-group {
            margin-bottom: 16px;
        }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: var(--anthropic-blue);
        }

        .button.secondary:hover {
            background: #5a8bb8;
        }

        .button.tertiary {
            background: var(--anthropic-green);
        }

        .button.tertiary:hover {
            background: #6b7b52;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button {
            flex: 1;
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: white;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
            padding: 100px;
        }

        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .canvas-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Primordial Utterance</h1>
            <div class="subtitle">The first greeting emerges from chaos as particles find their purpose in language.</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Particle Count</label>
                    <div class="slider-container">
                        <input type="range" id="particleCount" min="500" max="5000" step="100" value="2000" oninput="updateParam('particleCount', this.value)">
                        <span class="value-display" id="particleCount-value">2000</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Attraction Force</label>
                    <div class="slider-container">
                        <input type="range" id="attractionForce" min="0.01" max="0.15" step="0.01" value="0.05" oninput="updateParam('attractionForce', this.value)">
                        <span class="value-display" id="attractionForce-value">0.05</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Chaos Factor</label>
                    <div class="slider-container">
                        <input type="range" id="chaosFactor" min="0" max="2" step="0.1" value="0.8" oninput="updateParam('chaosFactor', this.value)">
                        <span class="value-display" id="chaosFactor-value">0.8</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Particle Size</label>
                    <div class="slider-container">
                        <input type="range" id="particleSize" min="1" max="6" step="0.5" value="2.5" oninput="updateParam('particleSize', this.value)">
                        <span class="value-display" id="particleSize-value">2.5</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Drift Speed</label>
                    <div class="slider-container">
                        <input type="range" id="driftSpeed" min="0.1" max="2" step="0.1" value="0.5" oninput="updateParam('driftSpeed', this.value)">
                        <span class="value-display" id="driftSpeed-value">0.5</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>

                <div class="color-group">
                    <label>Distant (Potential)</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#6a9bcc" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#6a9bcc</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Approaching (Clarity)</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#d9a757" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#d9a757</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Arrived (Presence)</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#d97757" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#d97757</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Awakening consciousness...</div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        // PRIMORDIAL UTTERANCE - Particles finding meaning in "Hello World"
        // ═══════════════════════════════════════════════════════════════════════

        let params = {
            seed: 12345,
            particleCount: 2000,
            attractionForce: 0.05,
            chaosFactor: 0.8,
            particleSize: 2.5,
            driftSpeed: 0.5,
            colorPalette: ['#6a9bcc', '#d9a757', '#d97757']
        };

        let defaultParams = {...params, colorPalette: [...params.colorPalette]};

        let particles = [];
        let letterPoints = [];
        let pg; // Graphics buffer for text sampling

        function setup() {
            let canvas = createCanvas(1200, 800);
            canvas.parent('canvas-container');

            initializeSystem();

            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            // Create graphics buffer to sample letter positions
            pg = createGraphics(width, height);
            pg.pixelDensity(1);
            pg.background(255);
            pg.fill(0);
            pg.textAlign(CENTER, CENTER);
            pg.textSize(140);
            pg.textFont('Georgia');
            pg.text('Hello World', width/2, height/2);
            pg.loadPixels();

            // Sample points from the text
            letterPoints = [];
            let spacing = 4;
            for (let x = 0; x < width; x += spacing) {
                for (let y = 0; y < height; y += spacing) {
                    let index = (x + y * width) * 4;
                    let brightness = pg.pixels[index];
                    if (brightness < 128) {
                        // Add some randomness to point positions
                        letterPoints.push({
                            x: x + random(-2, 2),
                            y: y + random(-2, 2)
                        });
                    }
                }
            }

            // Initialize particles
            particles = [];
            for (let i = 0; i < params.particleCount; i++) {
                particles.push(new Particle(i));
            }

            background(250, 249, 245);
        }

        function draw() {
            // Semi-transparent background for trails
            background(250, 249, 245, 25);

            for (let p of particles) {
                p.update();
                p.display();
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // PARTICLE CLASS - Each particle seeks its letter-home
        // ═══════════════════════════════════════════════════════════════════════

        class Particle {
            constructor(index) {
                // Start from random position (chaos)
                this.pos = createVector(random(width), random(height));
                this.vel = createVector(random(-1, 1), random(-1, 1));
                this.acc = createVector(0, 0);

                // Assign a target letter point (or be a wanderer)
                if (letterPoints.length > 0 && random() > 0.15) {
                    let targetIndex = floor(random(letterPoints.length));
                    this.target = createVector(
                        letterPoints[targetIndex].x,
                        letterPoints[targetIndex].y
                    );
                    this.isWanderer = false;
                } else {
                    this.target = null;
                    this.isWanderer = true;
                }

                this.maxSpeed = 3;
                this.noiseOffset = random(1000);
            }

            update() {
                if (this.isWanderer) {
                    // Wanderers drift with Perlin noise
                    let angle = noise(this.pos.x * 0.005, this.pos.y * 0.005, frameCount * 0.005 + this.noiseOffset) * TWO_PI * 2;
                    let noiseForce = p5.Vector.fromAngle(angle);
                    noiseForce.mult(params.driftSpeed * 0.1);
                    this.acc.add(noiseForce);
                } else {
                    // Seekers are attracted to their target
                    let desired = p5.Vector.sub(this.target, this.pos);
                    let distance = desired.mag();

                    // Attraction increases as particle approaches
                    let attractionStrength = params.attractionForce;
                    if (distance < 100) {
                        attractionStrength *= map(distance, 0, 100, 2, 1);
                    }

                    desired.normalize();
                    desired.mult(attractionStrength);
                    this.acc.add(desired);

                    // Add chaos/noise to prevent perfect convergence
                    let chaosAngle = noise(this.pos.x * 0.01 + this.noiseOffset, this.pos.y * 0.01, frameCount * 0.01) * TWO_PI * 2;
                    let chaosForce = p5.Vector.fromAngle(chaosAngle);
                    chaosForce.mult(params.chaosFactor * 0.02);
                    this.acc.add(chaosForce);
                }

                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed);
                this.pos.add(this.vel);
                this.acc.mult(0);

                // Wrap around edges
                if (this.pos.x < 0) this.pos.x = width;
                if (this.pos.x > width) this.pos.x = 0;
                if (this.pos.y < 0) this.pos.y = height;
                if (this.pos.y > height) this.pos.y = 0;
            }

            display() {
                let col;

                if (this.isWanderer) {
                    // Wanderers stay cool blue
                    col = color(params.colorPalette[0]);
                    col.setAlpha(100);
                } else {
                    // Seekers color based on distance to target
                    let distance = p5.Vector.dist(this.pos, this.target);
                    let maxDist = 300;
                    let t = constrain(map(distance, 0, maxDist, 1, 0), 0, 1);

                    // Interpolate through the color palette
                    let c1 = color(params.colorPalette[0]); // Distant - blue
                    let c2 = color(params.colorPalette[1]); // Approaching - amber
                    let c3 = color(params.colorPalette[2]); // Arrived - warm orange

                    if (t < 0.5) {
                        col = lerpColor(c1, c2, t * 2);
                    } else {
                        col = lerpColor(c2, c3, (t - 0.5) * 2);
                    }

                    // Closer particles are more opaque
                    let alpha = map(t, 0, 1, 80, 220);
                    col.setAlpha(alpha);
                }

                noStroke();
                fill(col);

                // Size varies slightly with velocity
                let size = params.particleSize * map(this.vel.mag(), 0, this.maxSpeed, 0.8, 1.2);
                ellipse(this.pos.x, this.pos.y, size, size);
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // UI CONTROL HANDLERS
        // ═══════════════════════════════════════════════════════════════════════

        function updateParam(paramName, value) {
            params[paramName] = parseFloat(value);
            document.getElementById(paramName + '-value').textContent = value;

            // For particle count, reinitialize
            if (paramName === 'particleCount') {
                initializeSystem();
            }
        }

        function updateColor(colorId, value) {
            let index = parseInt(colorId.replace('color', '')) - 1;
            params.colorPalette[index] = value;
            document.getElementById(colorId + '-value').textContent = value;
        }

        // ═══════════════════════════════════════════════════════════════════════
        // SEED CONTROL FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════════

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = {...defaultParams, colorPalette: [...defaultParams.colorPalette]};

            document.getElementById('particleCount').value = params.particleCount;
            document.getElementById('particleCount-value').textContent = params.particleCount;
            document.getElementById('attractionForce').value = params.attractionForce;
            document.getElementById('attractionForce-value').textContent = params.attractionForce;
            document.getElementById('chaosFactor').value = params.chaosFactor;
            document.getElementById('chaosFactor-value').textContent = params.chaosFactor;
            document.getElementById('particleSize').value = params.particleSize;
            document.getElementById('particleSize-value').textContent = params.particleSize;
            document.getElementById('driftSpeed').value = params.driftSpeed;
            document.getElementById('driftSpeed-value').textContent = params.driftSpeed;

            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];

            updateSeedDisplay();
            initializeSystem();
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
