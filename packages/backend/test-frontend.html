<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code as a Service - Test Frontend</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #16213e;
      padding: 1rem;
      border-bottom: 1px solid #0f3460;
    }
    .header h1 { font-size: 1.2rem; color: #e94560; }
    .header .status { font-size: 0.9rem; color: #888; margin-top: 0.5rem; }
    .header .status.connected { color: #4ade80; }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      padding: 1rem;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 1rem;
    }
    .message {
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      max-width: 85%;
    }
    .message.user {
      background: #0f3460;
      margin-left: auto;
    }
    .message.assistant {
      background: #1a1a2e;
      border: 1px solid #0f3460;
    }
    .message.system {
      background: transparent;
      color: #888;
      font-size: 0.85rem;
      text-align: center;
      max-width: 100%;
    }
    .message pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 0.9rem;
    }
    .tool-activity {
      font-size: 0.85rem;
      color: #f59e0b;
      padding: 0.5rem;
      background: rgba(245, 158, 11, 0.1);
      border-radius: 4px;
      margin: 0.5rem 0;
    }
    .input-area {
      display: flex;
      gap: 0.5rem;
    }
    .input-area input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid #0f3460;
      border-radius: 8px;
      background: #16213e;
      color: #eee;
      font-size: 1rem;
    }
    .input-area input:focus {
      outline: none;
      border-color: #e94560;
    }
    .input-area button {
      padding: 0.75rem 1.5rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }
    .input-area button:hover { background: #d13a54; }
    .input-area button:disabled {
      background: #555;
      cursor: not-allowed;
    }
    .thinking {
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Claude Code as a Service</h1>
    <div class="status" id="status">Connecting...</div>
  </div>

  <div class="main">
    <div class="messages" id="messages"></div>

    <div class="input-area">
      <input type="text" id="input" placeholder="Type a message..." disabled>
      <button id="send" disabled>Send</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');

    let clientId = null;
    let sessionId = null;
    let currentResponse = '';

    // Connect to server
    const socket = io('http://localhost:3001', {
      transports: ['websocket', 'polling'],
    });

    socket.on('connect', () => {
      statusEl.textContent = 'Connected';
      statusEl.classList.add('connected');
    });

    socket.on('disconnect', () => {
      statusEl.textContent = 'Disconnected';
      statusEl.classList.remove('connected');
      inputEl.disabled = true;
      sendBtn.disabled = true;
    });

    socket.on('client_id', (data) => {
      clientId = data.clientId;
      statusEl.textContent = `Connected (${clientId.slice(0, 8)}...)`;
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
      addMessage('system', 'Connected to Claude Code as a Service');
    });

    socket.on('agent_status', (data) => {
      if (data.sessionId) sessionId = data.sessionId;

      if (data.status === 'running') {
        sendBtn.disabled = true;
        addMessage('system', 'Agent is thinking...');
      } else if (data.status === 'complete') {
        sendBtn.disabled = false;
        inputEl.focus();
        // Finalize current response
        if (currentResponse) {
          finalizeResponse();
        }
      } else if (data.status === 'error') {
        sendBtn.disabled = false;
        addMessage('system', `Error: ${data.error || 'Unknown error'}`);
      }
    });

    socket.on('text_delta', (data) => {
      currentResponse += data.text;
      updateCurrentResponse();
    });

    socket.on('chat_response', (data) => {
      if (data.text && !currentResponse) {
        currentResponse = data.text;
        finalizeResponse();
      }
    });

    socket.on('tool_activity', (data) => {
      const { toolName, phase, description } = data.payload;
      if (phase === 'start') {
        addToolActivity(`🔧 ${toolName}: ${description || 'Running...'}`);
      }
    });

    socket.on('agent_thinking', (data) => {
      if (data.payload.phase === 'start') {
        addMessage('system', '💭 Thinking...');
      }
    });

    function addMessage(type, content) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.innerHTML = `<pre>${escapeHtml(content)}</pre>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addToolActivity(text) {
      const div = document.createElement('div');
      div.className = 'tool-activity';
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    let responseEl = null;
    function updateCurrentResponse() {
      if (!responseEl) {
        responseEl = document.createElement('div');
        responseEl.className = 'message assistant';
        responseEl.innerHTML = '<pre></pre>';
        messagesEl.appendChild(responseEl);
      }
      responseEl.querySelector('pre').textContent = currentResponse;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function finalizeResponse() {
      if (responseEl) {
        responseEl.querySelector('pre').textContent = currentResponse;
      }
      currentResponse = '';
      responseEl = null;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function sendMessage() {
      const message = inputEl.value.trim();
      if (!message) return;

      addMessage('user', message);
      inputEl.value = '';
      currentResponse = '';
      responseEl = null;

      socket.emit('chat', {
        message,
        sessionId,
        tenantId: 'default',
      });
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
