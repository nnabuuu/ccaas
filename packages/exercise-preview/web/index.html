<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Exercise Preview</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500&display=swap');
:root{
  --bg:#f4f3ef; --surface:#fbfaf7; --surface2:#edece7;
  --t1:#1c1c1a; --t2:#5c5b56; --t3:#9c9a92;
  --border:rgba(28,28,26,.07); --border-strong:rgba(28,28,26,.14);
  --teal:#0d5245; --teal-bg:#dfece8;
  --green:#2d6612; --green-bg:#e6f2dc;
  --red:#942929; --red-bg:#f5dada;
  --amber:#7a4d0e; --amber-bg:#f6edda;
  --purple:#3a3185; --purple-bg:#e9e7f3;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Plus Jakarta Sans",-apple-system,"PingFang SC",sans-serif;
  background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;
  -webkit-font-smoothing:antialiased;
  font-size:13px;line-height:1.5;
}
.app{display:grid;grid-template-columns:280px 1fr 360px;grid-template-rows:48px 1fr;height:100vh}
.topbar{
  grid-column:1/-1;
  display:flex;align-items:center;gap:14px;padding:0 16px;
  border-bottom:1px solid var(--border);background:var(--surface);
}
.brand{font-family:"Fraunces",Georgia,serif;font-size:18px;font-weight:500;letter-spacing:-.5px}
.brand em{font-style:italic;color:var(--teal)}
.crumb{color:var(--t3);font-size:11px;letter-spacing:.4px;text-transform:uppercase;font-weight:600}
.role-toggle{margin-left:auto;display:flex;gap:4px;background:var(--surface2);border-radius:6px;padding:3px}
.role-toggle button{
  background:transparent;border:none;padding:5px 12px;border-radius:4px;
  font:inherit;font-size:11px;font-weight:600;cursor:pointer;color:var(--t2);
}
.role-toggle button.active{background:var(--t1);color:#f0efe8}

/* Panes */
.pane{overflow-y:auto;padding:16px;border-right:1px solid var(--border)}
.pane.right{border-right:none;border-left:1px solid var(--border);background:var(--surface)}
.pane h2{
  font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;font-weight:700;
  margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);
}

/* Bundle/Story list */
.bundle{margin-bottom:14px}
.bundle-name{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.bundle-name code{font-family:"SF Mono",Menlo,monospace;font-size:10px;color:var(--teal);background:var(--teal-bg);padding:1px 6px;border-radius:3px}
.bundle-meta{font-size:11px;color:var(--t2);margin-bottom:6px}
.story{
  padding:6px 10px;margin-bottom:3px;border-radius:4px;cursor:pointer;
  font-size:12px;color:var(--t2);display:flex;justify-content:space-between;align-items:center;
}
.story:hover{background:var(--surface2);color:var(--t1)}
.story.active{background:var(--t1);color:#f0efe8;font-weight:600}
.story .tag{font-size:9px;text-transform:uppercase;letter-spacing:.4px;opacity:.7}

/* Stage */
.stage-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.stage-title{font-family:"Fraunces",Georgia,serif;font-size:22px;font-weight:500;letter-spacing:-.5px}
.stage-title em{font-style:italic;color:var(--teal)}
.btn{
  padding:8px 14px;border:none;border-radius:6px;cursor:pointer;
  font:inherit;font-size:12px;font-weight:600;
  transition:all .15s;
}
.btn.pri{background:var(--t1);color:#f0efe8}
.btn.pri:hover{transform:translateY(-1px);box-shadow:0 8px 16px -6px rgba(28,28,26,.3)}
.btn.sec{background:var(--surface);color:var(--t1);border:1px solid var(--border-strong)}
.btn.sec:hover{background:var(--surface2)}

.section{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:16px;margin-bottom:12px;
}
.section-label{
  font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;font-weight:700;
  margin-bottom:8px;
}
pre.json{
  font-family:"SF Mono",Menlo,monospace;font-size:11px;line-height:1.55;
  background:var(--bg);border:1px solid var(--border);border-radius:6px;
  padding:10px 12px;color:var(--t1);overflow-x:auto;white-space:pre-wrap;word-break:break-word;
  max-height:280px;overflow-y:auto;
}
textarea.ans-input{
  width:100%;min-height:160px;
  font-family:"SF Mono",Menlo,monospace;font-size:12px;line-height:1.6;
  border:1px solid var(--border-strong);border-radius:6px;padding:10px;
  resize:vertical;background:var(--surface);color:var(--t1);
}
textarea.ans-input:focus{outline:2px solid var(--teal);outline-offset:-1px}

/* Inspector */
.insp-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.insp-row .k{font-size:11px;color:var(--t3);font-weight:600}
.insp-row .v{font-size:12px;color:var(--t1);font-weight:700;font-family:"SF Mono",Menlo,monospace}
.insp-row .v.ok{color:var(--green)}
.insp-row .v.wrong{color:var(--red)}
.insp-row .v.partial{color:var(--amber)}
.insp-empty{font-size:11px;color:var(--t3);font-style:italic;padding:12px 0}
.insp-card{
  background:var(--bg);border:1px solid var(--border);border-radius:6px;
  padding:10px;margin-bottom:8px;
}
.insp-card-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;font-weight:700;margin-bottom:6px}

/* Teacher view */
.teacher-row{
  display:grid;grid-template-columns:60px 1fr 80px 80px;
  font-size:12px;padding:8px 10px;border-bottom:1px solid var(--border);
}
.teacher-row.head{font-size:10px;text-transform:uppercase;color:var(--t3);font-weight:700;letter-spacing:.4px;border-bottom:1px solid var(--border-strong)}
.score-pill{
  display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;
}
.score-pill.hi{background:var(--green-bg);color:var(--green)}
.score-pill.mid{background:var(--amber-bg);color:var(--amber)}
.score-pill.lo{background:var(--red-bg);color:var(--red)}

.empty{text-align:center;padding:40px;color:var(--t3);font-size:13px}
.empty strong{color:var(--t1);font-weight:600;display:block;margin-bottom:6px}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand">Exercise <em>Preview</em></div>
    <div class="crumb" id="crumb">no bundle loaded</div>
    <div class="role-toggle" id="role-toggle">
      <button data-role="student" class="active">Student</button>
      <button data-role="teacher">Teacher</button>
      <button data-role="inspector">Inspector</button>
    </div>
  </div>

  <!-- LEFT: bundle/story list -->
  <div class="pane left">
    <h2>Bundles</h2>
    <div id="bundle-list"><div class="empty">Loading...</div></div>
  </div>

  <!-- MIDDLE: stage -->
  <div class="pane middle">
    <div id="stage"><div class="empty"><strong>Select a story</strong>Pick a bundle and story from the left.</div></div>
  </div>

  <!-- RIGHT: inspector -->
  <div class="pane right">
    <h2>Inspector</h2>
    <div id="inspector"><div class="insp-empty">No session yet. Pick a story to start.</div></div>
  </div>

</div>

<script type="module">
// ──────────────── State ────────────────
const state = {
  bundles: [],
  activeBundleId: null,
  activeStoryName: null,
  sessionId: null,
  story: null,
  ans: {},
  role: 'student',  // student | teacher | inspector
  // Locale switcher (set via admin playground postMessage). Today only
  // affects the Inspector "locale" metadata display — the bundled web UI
  // strings are still hardcoded zh-CN. Wiring those through i18n.ts is a
  // v2 task; preserving the locale on the state object is the foothold.
  locale: 'zh-CN',
  lastGrade: null,
  history: [],
};

// ──────────────── API ────────────────
const api = {
  async bundles() {
    const r = await fetch('/preview/bundles');
    return r.json();
  },
  async createSession(bundleId, storyName) {
    const r = await fetch('/preview/sessions', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({bundleId, storyName}),
    });
    return r.json();
  },
  async check(sessionId, ans) {
    const r = await fetch(`/preview/sessions/${sessionId}/check`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ans}),
    });
    return r.json();
  },
  async inspector(sessionId) {
    const r = await fetch(`/preview/sessions/${sessionId}/inspector`);
    return r.json();
  },
  async reset(sessionId) {
    const r = await fetch(`/preview/sessions/${sessionId}/reset`, {method:'POST'});
    return r.json();
  },
};

// ──────────────── Rendering ────────────────
function renderBundleList() {
  const el = document.getElementById('bundle-list');
  if (state.bundles.length === 0) {
    el.innerHTML = '<div class="empty"><strong>No bundles found</strong>Add *.stories.ts files with defineStories().</div>';
    return;
  }
  el.innerHTML = state.bundles.map(b => `
    <div class="bundle">
      <div class="bundle-name">${escape(b.meta.title)} <code>${escape(b.plugin.type)}</code></div>
      ${b.meta.description ? `<div class="bundle-meta">${escape(b.meta.description)}</div>` : ''}
      ${b.stories.map(s => `
        <div class="story ${state.activeStoryName === s.name && state.activeBundleId === b.bundleId ? 'active' : ''}"
             data-bundle="${escape(b.bundleId)}" data-story="${escape(s.name)}">
          <span>${escape(s.displayName)}</span>
          <span class="tag">${escape(s.initialRole || 'student')}</span>
        </div>
      `).join('')}
    </div>
  `).join('');

  el.querySelectorAll('.story').forEach(node => {
    node.addEventListener('click', () => openStory(node.dataset.bundle, node.dataset.story));
  });
}

function renderStage() {
  const stage = document.getElementById('stage');
  if (!state.story) {
    stage.innerHTML = '<div class="empty"><strong>Select a story</strong>Pick a bundle and story from the left.</div>';
    return;
  }
  document.getElementById('crumb').textContent = `${state.activeBundleId} · ${state.activeStoryName}`;

  if (state.role === 'teacher') {
    renderTeacherStage(stage);
  } else if (state.role === 'inspector') {
    renderInspectorStage(stage);
  } else {
    renderStudentStage(stage);
  }
}

function renderStudentStage(stage) {
  const story = state.story;
  const ansJson = JSON.stringify(state.ans, null, 2);
  stage.innerHTML = `
    <div class="stage-header">
      <div class="stage-title"><em>${escape(state.activeStoryName)}</em> · Student View</div>
      <div>
        <button class="btn sec" id="reset-btn">Reset</button>
        <button class="btn pri" id="check-btn">Submit / Check</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Sanitized AnswerKey (server-safe)</div>
      <pre class="json">${escape(JSON.stringify(story.answerKey, null, 2))}</pre>
    </div>

    <div class="section">
      <div class="section-label">Student Answer (data) — edit JSON to simulate input</div>
      <textarea class="ans-input" id="ans-input">${escape(ansJson)}</textarea>
    </div>

    ${state.lastGrade ? `
      <div class="section">
        <div class="section-label">Last Grade Result</div>
        <pre class="json">${escape(JSON.stringify(state.lastGrade, null, 2))}</pre>
      </div>
    ` : ''}
  `;

  document.getElementById('check-btn').addEventListener('click', onCheck);
  document.getElementById('reset-btn').addEventListener('click', onReset);
  document.getElementById('ans-input').addEventListener('input', e => {
    try {
      state.ans = JSON.parse(e.target.value);
    } catch {}
  });
}

function renderTeacherStage(stage) {
  const story = state.story;
  const submissions = story.classSubmissions || [];
  if (submissions.length === 0) {
    stage.innerHTML = `
      <div class="stage-header">
        <div class="stage-title"><em>${escape(state.activeStoryName)}</em> · Teacher View</div>
      </div>
      <div class="empty"><strong>No mock submissions</strong>This story has no classSubmissions array. Add one to preview the teacher dashboard.</div>
    `;
    return;
  }
  const rows = submissions.map(s => {
    const score = s.score ?? '—';
    const pill = score === '—' ? '' : score >= 80 ? 'hi' : score >= 50 ? 'mid' : 'lo';
    return `<div class="teacher-row">
      <span>${escape(s.studentId)}</span>
      <span>${escape(s.name)}</span>
      <span><span class="score-pill ${pill}">${score}</span></span>
      <span>${s.submittedAt ? new Date(s.submittedAt).toLocaleTimeString() : '—'}</span>
    </div>`;
  }).join('');
  stage.innerHTML = `
    <div class="stage-header">
      <div class="stage-title"><em>${escape(state.activeStoryName)}</em> · Teacher View</div>
      <div>${submissions.length} students</div>
    </div>
    <div class="section" style="padding:0">
      <div class="teacher-row head"><span>ID</span><span>Name</span><span>Score</span><span>Submitted</span></div>
      ${rows}
    </div>
  `;
}

function renderInspectorStage(stage) {
  stage.innerHTML = `
    <div class="stage-header">
      <div class="stage-title"><em>${escape(state.activeStoryName)}</em> · Inspector Stage</div>
    </div>
    <div class="section">
      <div class="section-label">Story metadata</div>
      <pre class="json">${escape(JSON.stringify({
        name: state.story.name,
        locale: state.story.locale,
        initialPhase: state.story.initialPhase,
        initialRole: state.story.initialRole,
        skipInDemo: state.story.skipInDemo,
        notes: state.story.notes,
        metadata: state.story.metadata,
      }, null, 2))}</pre>
    </div>
    <div class="section">
      <div class="section-label">Full Grade History</div>
      <pre class="json">${escape(JSON.stringify(state.history, null, 2))}</pre>
    </div>
  `;
}

function renderInspector() {
  const el = document.getElementById('inspector');
  if (!state.sessionId) {
    el.innerHTML = '<div class="insp-empty">No session yet. Pick a story to start.</div>';
    return;
  }
  const lg = state.lastGrade;
  const sections = [
    `<div class="insp-card">
      <div class="insp-card-title">Session</div>
      <div class="insp-row"><span class="k">sessionId</span><span class="v" title="${state.sessionId}">${state.sessionId.slice(0,8)}…</span></div>
      <div class="insp-row"><span class="k">bundle</span><span class="v">${escape(state.activeBundleId)}</span></div>
      <div class="insp-row"><span class="k">story</span><span class="v">${escape(state.activeStoryName)}</span></div>
    </div>`,
    `<div class="insp-card">
      <div class="insp-card-title">Plugin Lifecycle</div>
      <div class="insp-row"><span class="k">grade calls</span><span class="v">${state.history.length}</span></div>
      <div class="insp-row"><span class="k">last duration</span><span class="v">${lg?.durationMs ?? '—'}ms</span></div>
      <div class="insp-row"><span class="k">last status</span><span class="v ${lg?.ok === true ? 'ok' : lg?.ok === false ? 'wrong' : ''}">${lg?.ok === true ? 'ok' : lg?.ok === false ? (lg.reason || 'error') : '—'}</span></div>
    </div>`,
  ];
  if (lg && lg.ok) {
    const total = lg.total;
    const cls = typeof total === 'number' ? (total >= 80 ? 'ok' : total >= 50 ? 'partial' : 'wrong') : '';
    sections.push(`<div class="insp-card">
      <div class="insp-card-title">Last Grade Result</div>
      <div class="insp-row"><span class="k">total</span><span class="v ${cls}">${total ?? '—'}</span></div>
      ${lg.byDimension ? `
        <div class="insp-row" style="display:block">
          <span class="k">byDimension</span>
          <pre class="json" style="margin-top:6px">${escape(JSON.stringify(lg.byDimension, null, 2))}</pre>
        </div>
      ` : ''}
    </div>`);
  } else if (lg && !lg.ok) {
    sections.push(`<div class="insp-card">
      <div class="insp-card-title">Last Grade Error</div>
      <div class="insp-row"><span class="k">reason</span><span class="v wrong">${escape(lg.reason)}</span></div>
      ${lg.message ? `<div class="insp-row" style="display:block"><span class="k">message</span><span class="v">${escape(lg.message)}</span></div>` : ''}
    </div>`);
  }
  el.innerHTML = sections.join('');
}

// ──────────────── Actions ────────────────
async function openStory(bundleId, storyName) {
  state.activeBundleId = bundleId;
  state.activeStoryName = storyName;
  const session = await api.createSession(bundleId, storyName);
  state.sessionId = session.sessionId;
  state.story = session.story;
  state.ans = {...(session.story.initialAns ?? {})};
  state.lastGrade = null;
  state.history = [];
  if (session.story.initialRole) state.role = session.story.initialRole;
  updateRoleButtons();
  renderBundleList();
  renderStage();
  renderInspector();
}

async function onCheck() {
  if (!state.sessionId) return;
  const result = await api.check(state.sessionId, state.ans);
  state.lastGrade = result;
  state.history.push(result);
  renderStage();
  renderInspector();
}

async function onReset() {
  if (!state.sessionId) return;
  await api.reset(state.sessionId);
  state.ans = {...(state.story.initialAns ?? {})};
  state.lastGrade = null;
  state.history = [];
  renderStage();
  renderInspector();
}

function updateRoleButtons() {
  document.querySelectorAll('#role-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.role === state.role);
  });
}

document.getElementById('role-toggle').addEventListener('click', e => {
  if (e.target.dataset.role) {
    state.role = e.target.dataset.role;
    updateRoleButtons();
    renderStage();
  }
});

function escape(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ──────────────── postMessage protocol (Admin Playground embed) ────────────────
//
// SECURITY: the iframe only accepts messages whose `event.origin` is either
// the same origin as the iframe itself OR matches the explicit allow-list
// passed via `?parentOrigin=...` in the iframe src. Replies are posted to the
// recorded parent origin, NOT '*'.

const PARENT_SOURCE = 'kedge-playground'
const PREVIEW_SOURCE = 'kedge-preview'

let trustedParentOrigin = null

function isAllowedParentOrigin(origin) {
  if (!origin) return false
  if (origin === window.location.origin) return true
  const allow = new URLSearchParams(window.location.search).get('parentOrigin')
  if (allow && origin === allow) return true
  return false
}

function postToParent(type, payload) {
  if (!(window.parent && window.parent !== window)) return
  const target = trustedParentOrigin ?? window.location.origin
  window.parent.postMessage({ source: PREVIEW_SOURCE, type, payload }, target)
}

window.addEventListener('message', async (event) => {
  const msg = event.data
  if (!msg || msg.source !== PARENT_SOURCE) return
  if (!isAllowedParentOrigin(event.origin)) {
    console.warn('[preview] rejected postMessage from origin', event.origin)
    return
  }
  trustedParentOrigin = event.origin
  try {
    if (msg.type === 'open-story' && msg.payload) {
      await openStory(msg.payload.bundleId, msg.payload.storyName)
      postToParent('story-loaded', { sessionId: state.sessionId })
    } else if (msg.type === 'set-answer-key' && msg.payload && state.story) {
      state.story = { ...state.story, answerKey: msg.payload.answerKey }
      renderStage()
    } else if (msg.type === 'set-locale' && msg.payload) {
      // Stash the locale on state + the active story (Inspector reads it for
      // its metadata display). UI strings are still hardcoded zh-CN today;
      // see i18n.ts §16.4 for the v2 plan.
      state.locale = msg.payload.locale
      if (state.story) state.story = { ...state.story, locale: msg.payload.locale }
      renderStage()
    } else if (msg.type === 'submit') {
      await onCheck()
      postToParent('grade-result', { result: state.lastGrade })
    } else if (msg.type === 'reset') {
      await onReset()
    }
  } catch (e) {
    postToParent('error', { message: e instanceof Error ? e.message : String(e) })
  }
})

// ──────────────── Init ────────────────
(async function init() {
  // Skip the ready broadcast if we don't yet have a trusted parent — the
  // first valid 'open-story' message will set trustedParentOrigin, after
  // which subsequent posts will reach the parent. If the page is opened
  // standalone (not embedded), there is no parent and postToParent no-ops.
  try {
    state.bundles = await api.bundles()
    renderBundleList()
    // Only post 'ready' when we already have a trusted origin (the parent
    // sent us 'configure' beforehand). Otherwise we miss the first message
    // race, which is fine — the parent will still get story-loaded on its
    // first open-story call.
    if (trustedParentOrigin) postToParent('ready', { bundleCount: state.bundles.length })
  } catch (e) {
    document.getElementById('bundle-list').innerHTML =
      `<div class="empty"><strong>Failed to load</strong>${escape(e.message || String(e))}</div>`
  }
})()
</script>
</body>
</html>
