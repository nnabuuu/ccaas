<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #1C2833; font-family: Arial, sans-serif;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
}
.title { color: #ffffff; font-size: 32pt; font-weight: bold; text-align: center; margin-bottom: 30pt; }
.code-box { background: #2E4053; border-radius: 8pt; padding: 20pt 30pt; margin-bottom: 30pt; }
.code-text { color: #5DADE2; font-size: 14pt; font-family: Courier New, monospace; margin: 0; }
.links { display: flex; gap: 40pt; }
.link-item { text-align: center; }
.link-label { color: #AAB7B8; font-size: 11pt; margin: 0 0 5pt 0; }
.link-text { color: #5DADE2; font-size: 12pt; margin: 0; }
</style>
</head>
<body>
<h1 class="title">Get Started</h1>
<div class="code-box">
  <p class="code-text">npm install @ccaas/vue-sdk</p>
</div>
<div class="links">
  <div class="link-item">
    <p class="link-label">Documentation</p>
    <p class="link-text">docs/ARCHITECTURE.md</p>
  </div>
  <div class="link-item">
    <p class="link-label">Examples</p>
    <p class="link-text">README.md</p>
  </div>
  <div class="link-item">
    <p class="link-label">Tests</p>
    <p class="link-text">npm run test</p>
  </div>
</div>
</body>
</html>
