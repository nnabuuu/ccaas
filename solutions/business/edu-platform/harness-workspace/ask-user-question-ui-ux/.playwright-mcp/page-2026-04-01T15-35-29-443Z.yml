                - text: AD为中线，BD = DC = ½BC。又AD = ½BC，所以 AD = BD = DC。由 BE = AD = DC，得 BE = DC。在△ABE与△ACD中：AB = AB（公共边不成立，需重新分析）——实际上 AD = BE，BD = DC，而AB是公共边不共用。利用 AD = BE = DC，BD = DC = AD，AB = AC 不一定成立。正确思路：BE = AD = DC，BD = DC，AD = BE，因此△ABD中 BD = AD 为等腰三角形。综合条件 AB = AB 不适用，本题用
                - strong [ref=e193]: SSS
                - text: ：在△ABE和△ACD中，BE = DC, AE = AD（需进一步推导），故选A。
