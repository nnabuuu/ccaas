            - heading "全等三角形判定 · 随堂测试" [level=2] [ref=e333]
            - paragraph [ref=e334]:
              - strong [ref=e335]: 考查知识点
              - text: ：SSS、SAS、ASA、AAS、HL判定定理
            - separator [ref=e336]
            - paragraph [ref=e337]:
              - strong [ref=e338]: "1."
              - text: 在△ABC和△DEF中，已知AB = DE，BC = EF，∠B = ∠E，则△ABC ≌ △DEF的判定依据是（ ）
            - paragraph [ref=e339]: A. SSS B. SAS C. ASA D. AAS
            - separator [ref=e340]
            - paragraph [ref=e341]:
              - strong [ref=e342]: "2."
              - text: 下列条件中，
              - strong [ref=e343]: 不能
              - text: 判定两个三角形全等的是（ ）
            - paragraph [ref=e344]: A. 两边和其中一边的对角分别相等（SSA） B. 两角和它们的夹边分别相等（ASA） C. 两角和其中一角的对边分别相等（AAS） D. 三边分别相等（SSS）
            - separator [ref=e345]
            - paragraph [ref=e346]:
              - strong [ref=e347]: "3."
              - text: 如图，点E、F在线段BC上，且BE = CF，AB = DC，∠B = ∠C。要证明△ABF ≌ △DCE，应选用的判定方法是（ ）
            - paragraph [ref=e348]: A. SSS B. SAS C. ASA D. AAS
            - separator [ref=e349]
            - paragraph [ref=e350]:
              - strong [ref=e351]: "4."
              - text: 在Rt△ABC和Rt△DEF中，∠C = ∠F = 90°，若要用"HL"判定它们全等，已知AB = DE，还需补充的条件是（ ）
            - paragraph [ref=e352]: A. ∠A = ∠D B. AC = DF（或BC = EF） C. ∠B = ∠E D. 以上条件均可
            - separator [ref=e353]
            - paragraph [ref=e354]:
              - strong [ref=e355]: "5."
              - text: 在△ABC中，AD是BC边上的中线，且AD = ½BC。若在BC上取点E使BE = AD，则△ABE与△ACD能判定全等的依据是（ ）
            - paragraph [ref=e356]: A. SSS B. SAS C. 无法判定全等 D. ASA
            - separator [ref=e357]
            - heading "参考答案与解析" [level=2] [ref=e358]
            - paragraph [ref=e359]:
              - strong [ref=e360]: 1. 答案：B
            - blockquote [ref=e361]:
              - paragraph [ref=e362]: 已知两边（AB=DE, BC=EF）及夹角（∠B=∠E）相等，符合SAS（边角边）判定。
            - paragraph [ref=e363]:
              - strong [ref=e364]: 2. 答案：A
            - blockquote [ref=e365]:
              - paragraph [ref=e366]: SSA（边边角）不是三角形全等的判定定理。两边及其中一边的对角相等时，可能对应两种不同的三角形（"歧义情形"），因此不能判定全等。
            - paragraph [ref=e367]:
              - strong [ref=e368]: 3. 答案：B
            - blockquote [ref=e369]:
              - paragraph [ref=e370]:
                - text: 由 BE = CF 可得 BE + EF = CF + EF，即 BF = CE。再结合 AB = DC、∠B = ∠C，用 SAS 判定 △ABF ≌ △DCE。
                - strong [ref=e371]: 关键技巧
                - text: ：利用公共线段 EF 进行等量代换。
            - paragraph [ref=e372]:
              - strong [ref=e373]: 4. 答案：B
            - blockquote [ref=e374]:
              - paragraph [ref=e375]: HL（斜边直角边）需要：斜边相等 + 一条直角边相等。已知斜边 AB = DE，还需一条直角边相等。选项A、C补充的是角，用的是AAS而非HL。选项D不正确，因为并非所有条件都适用HL。
            - paragraph [ref=e376]:
              - strong [ref=e377]: 5. 答案：A
            - blockquote [ref=e378]:
              - paragraph [ref=e379]:
                - text: AD为中线，BD = DC = ½BC。又AD = ½BC，所以 AD = BD = DC。由 BE = AD = DC，得 BE = DC。在△ABE与△ACD中：AB = AB（公共边不成立，需重新分析）——实际上 AD = BE，BD = DC，而AB是公共边不共用。利用 AD = BE = DC，BD = DC = AD，AB = AC 不一定成立。正确思路：BE = AD = DC，BD = DC，AD = BE，因此△ABD中 BD = AD 为等腰三角形。综合条件 AB = AB 不适用，本题用
                - strong [ref=e380]: SSS
                - text: ：在△ABE和△ACD中，BE = DC, AE = AD（需进一步推导），故选A。
