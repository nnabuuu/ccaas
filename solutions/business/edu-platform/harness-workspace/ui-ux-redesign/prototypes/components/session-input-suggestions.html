<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>组件: Session Context + Quick Suggestions + Input Bar</title>
<style>
:root{--bg1:#fff;--bg2:#f5f5f0;--t1:#1a1a1a;--t2:#6b6b65;--t3:#9c9a92;--b1:rgba(0,0,0,.12);--info-bg:#E6F1FB;--info-t:#0C447C;--purple-bg:#EEEDFE;--purple-t:#3C3489;--r:8px;--rl:12px}
*{box-sizing:border-box;margin:0}
body{font-family:-apple-system,"SF Pro Text","Segoe UI","PingFang SC",sans-serif;background:var(--bg2);color:var(--t1);display:flex;justify-content:center;padding:24px}
.wrap{width:100%;max-width:640px}
.wrap>h3{font-size:14px;font-weight:600;color:var(--t2);margin-bottom:12px}
.wrap>p{font-size:12px;color:var(--t3);margin-bottom:16px;line-height:1.6}
.section{margin-bottom:28px}
.section-title{font-size:12px;font-weight:500;color:var(--t3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.3px}

/* Session Context Bar */
.ctx-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg1);border:.5px solid var(--b1);border-radius:var(--rl)}
.ctx-left{display:flex;gap:6px;align-items:center}
.chip{font-size:11px;padding:4px 12px;border-radius:12px;background:var(--bg2);color:var(--t2);border:.5px solid var(--b1);transition:all .15s;cursor:default}
.chip.active{background:var(--info-bg);color:var(--info-t);border-color:transparent}
.chip.tenant{background:var(--purple-bg);color:var(--purple-t);border-color:transparent}
.chip.clickable{cursor:pointer}
.chip.clickable:hover{background:#e8e7e0}

/* Quick Suggestions */
.suggestions{display:flex;gap:6px;flex-wrap:wrap}
.sug{font-size:11px;padding:5px 14px;border-radius:14px;border:.5px solid var(--b1);background:var(--bg1);color:var(--t2);cursor:pointer;font-family:inherit;transition:all .15s}
.sug:hover{background:var(--bg2);border-color:rgba(0,0,0,.18)}

/* Input Bar */
.input-bar{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--bg1);border:.5px solid var(--b1);border-radius:var(--rl)}
.input-field{flex:1;padding:9px 14px;border:.5px solid var(--b1);border-radius:20px;font-size:13px;background:var(--bg1);color:var(--t1);font-family:inherit;outline:none;transition:border-color .15s}
.input-field:focus{border-color:var(--info-t)}
.send-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--t1);color:var(--bg1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:opacity .15s}
.send-btn:hover{opacity:.85}
.send-btn:disabled{opacity:.3;cursor:not-allowed}
.input-tools{display:flex;gap:4px;margin-right:4px}
.input-tool{width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.input-tool:hover{background:var(--bg2);color:var(--t2)}
</style>
</head>
<body>
<div class="wrap">
<h3>Session Context + Quick Suggestions + Input Bar</h3>
<p>Chat 界面的框架组件：顶部上下文栏、底部快捷建议和输入栏。<br>Session context 可切换，快捷建议由规则引擎动态生成。</p>

<div class="section">
  <div class="section-title">Session Context Bar — 教师视角</div>
  <div class="ctx-bar">
    <div class="ctx-left">
      <span class="chip active">八(2)班</span>
      <span class="chip">数学</span>
      <span class="chip">树人中学</span>
    </div>
    <span class="chip clickable" onclick="alert('弹出班级切换面板')">切换班级</span>
  </div>
</div>

<div class="section">
  <div class="section-title">Session Context Bar — ccaas-core Tenant 视角</div>
  <div class="ctx-bar">
    <div class="ctx-left">
      <span class="chip tenant">树人中学</span>
      <span class="chip active">张明 · 数学教师</span>
    </div>
    <span class="chip clickable" onclick="alert('弹出会话模板选择')">切换模板</span>
  </div>
</div>

<div class="section">
  <div class="section-title">Quick Suggestions — 规则引擎生成</div>
  <div class="suggestions">
    <button class="sug">本周学情</button>
    <button class="sug">单元测试</button>
    <button class="sug">家长会发言</button>
    <button class="sug">教研任务</button>
  </div>
  <div style="height:12px"></div>
  <div style="font-size:11px;color:var(--t3);margin-bottom:8px">期末阶段自动推荐:</div>
  <div class="suggestions">
    <button class="sug">期末复习方案</button>
    <button class="sug">期末试卷</button>
    <button class="sug">学期总评</button>
    <button class="sug">成绩分析报告</button>
  </div>
</div>

<div class="section">
  <div class="section-title">Input Bar — 基础版</div>
  <div class="input-bar">
    <input class="input-field" placeholder="输入你的需求，或点击上方快捷操作..." />
    <button class="send-btn">&#8593;</button>
  </div>
</div>

<div class="section">
  <div class="section-title">Input Bar — 带工具按钮</div>
  <div class="input-bar">
    <div class="input-tools">
      <button class="input-tool" title="上传文件" onclick="alert('上传文件')">&#128206;</button>
      <button class="input-tool" title="选择 Skill" onclick="alert('选择 Skill')">&#9881;</button>
    </div>
    <input class="input-field" placeholder="描述你的需求..." />
    <button class="send-btn">&#8593;</button>
  </div>
</div>
</div>
</body>
</html>
