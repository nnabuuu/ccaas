<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>з»„д»¶: ReviewPanel</title>
<style>
:root{--bg1:#fff;--bg2:#f5f5f0;--t1:#1a1a1a;--t2:#6b6b65;--t3:#9c9a92;--b1:rgba(0,0,0,.12);--info-bg:#E6F1FB;--info-t:#0C447C;--success-bg:#EAF3DE;--success-t:#27500A;--warn-bg:#FAEEDA;--warn-t:#854F0B;--danger-bg:#FCEBEB;--danger-t:#A32D2D;--r:8px;--rl:12px}
*{box-sizing:border-box;margin:0}
body{font-family:-apple-system,"SF Pro Text","Segoe UI","PingFang SC",sans-serif;background:var(--bg2);color:var(--t1);display:flex;justify-content:center;padding:24px}
.wrap{width:100%;max-width:640px}
.wrap>h3{font-size:14px;font-weight:600;color:var(--t2);margin-bottom:12px}
.wrap>p{font-size:12px;color:var(--t3);margin-bottom:16px;line-height:1.6}
.widget{border:.5px solid var(--b1);border-radius:var(--rl);background:var(--bg1);overflow:hidden}
.wh{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:.5px solid var(--b1)}
.wt{font-size:13px;font-weight:600}
.wb{font-size:10px;padding:2px 8px;border-radius:8px;background:var(--info-bg);color:var(--info-t)}
.wd{padding:14px}
.item{border:.5px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:10px;background:var(--bg1);transition:border-color .15s}
.item.kept{border-color:var(--success-t);background:rgba(234,243,222,.3)}
.item.replaced{border-color:var(--warn-t);background:rgba(250,238,218,.3)}
.item.removed{opacity:.4;text-decoration:line-through}
.q{font-size:13px;line-height:1.7;margin-bottom:10px}
.q .num{font-weight:600;margin-right:4px}
.meta{display:flex;gap:6px;font-size:11px;color:var(--t3);margin-bottom:10px;flex-wrap:wrap}
.meta span{padding:2px 8px;background:var(--bg2);border-radius:4px}
.meta .src-bank{background:var(--info-bg);color:var(--info-t)}
.meta .src-ai{background:var(--warn-bg);color:var(--warn-t)}
.acts{display:flex;gap:6px}
.acts button{font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer;border:.5px solid var(--b1);background:var(--bg1);color:var(--t2);font-family:inherit;transition:all .15s}
.acts button:hover{background:var(--bg2)}
.acts button.keep{background:var(--success-bg);color:var(--success-t);border-color:transparent}
.acts button.replace{background:var(--warn-bg);color:var(--warn-t);border-color:transparent}
.acts button.remove{background:var(--danger-bg);color:var(--danger-t);border-color:transparent}
.acts button.active{outline:2px solid currentColor;outline-offset:1px}
.footer{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;border-top:.5px solid var(--b1)}
.counter{font-size:12px;color:var(--t2)}
.counter b{font-weight:600;color:var(--t1)}
.footer-actions{display:flex;gap:6px}
.btn{font-size:12px;padding:6px 14px;border-radius:var(--r);cursor:pointer;border:.5px solid var(--b1);background:var(--bg1);color:var(--t2);font-family:inherit}
.btn.pri{background:var(--t1);color:var(--bg1);border-color:var(--t1)}
</style>
</head>
<body>
<div class="wrap">
<h3>ReviewPanel з»„д»¶</h3>
<p>йҖҗйЎ№е®Ўж ёйқўжқҝгҖӮз”ЁдәҺиҜ•еҚ·е®Ўж ёпјҲйҖҗйўҳдҝқз•ҷ/жӣҝжҚў/еҫ®и°ғ/еҲ йҷӨпјүжҲ–ж•ҷжЎҲе®Ўж ёгҖӮ<br>жҜҸйЎ№зӢ¬з«Ӣж“ҚдҪңпјҢеә•йғЁз»ҹи®Ўе®Ўж ёиҝӣеәҰгҖӮж ҮжіЁйўҳзӣ®жқҘжәҗпјҲйўҳеә“ vs AI еҺҹеҲӣпјүгҖӮ</p>

<div class="widget">
  <div class="wh"><span class="wt">иҜ•йўҳе®Ўж ё</span><span class="wb">ReviewPanel</span></div>
  <div class="wd" id="items"></div>
</div>
</div>

<script>
const questions=[
  {id:1,q:'еңЁ в–іABC е’Ң в–іDEF дёӯпјҢAB=DE, BC=EF, AC=DFпјҢеҲҷ в–іABC вүҢ в–іDEF зҡ„еҲӨе®ҡдҫқжҚ®жҳҜпјҲгҖҖпјү\nA. SASгҖҖB. SSSгҖҖC. ASAгҖҖD. AAS',kp:'SSS еҲӨе®ҡ',diff:0.45,src:'bank',status:null},
  {id:2,q:'е·ІзҹҘ в–іABC дёӯпјҢвҲ A=50В°, AB=6cm, BC=8cmгҖӮиҰҒдҪҝ в–іDEF вүҢ в–іABCпјҢдёӢеҲ—жқЎд»¶дёӯдёҚе……еҲҶзҡ„жҳҜпјҲгҖҖпјү\nA. вҲ D=50В°, DE=6, EF=8гҖҖB. DF=AC, DE=6, вҲ D=50В°гҖҖC. EF=8, вҲ E=вҲ B, DE=6гҖҖD. вҲ D=50В°, вҲ E=вҲ B, DE=6',kp:'SAS з»јеҗҲ',diff:0.62,src:'ai',status:null},
  {id:3,q:'еҰӮеӣҫпјҢAB=CD, AD=CBпјҢеҲҷ в–іABD вүҢ в–іCDB зҡ„дҫқжҚ®жҳҜпјҲгҖҖпјү\nA. SSSгҖҖB. SASгҖҖC. ASAгҖҖD. ж— жі•еҲӨж–ӯ',kp:'SSS еҲӨе®ҡ',diff:0.48,src:'bank',status:null},
  {id:4,q:'еңЁ в–іABC дёӯпјҢD жҳҜ BC зҡ„дёӯзӮ№пјҢдё” ADвҠҘBCгҖӮиӢҘ BD=3, AD=4пјҢеҲҷ в–іABD вүҢ в–іACD зҡ„дҫқжҚ®жҳҜпјҲгҖҖпјү\nA. SSSгҖҖB. SASгҖҖC. HLгҖҖD. ASA',kp:'SAS еҲӨе®ҡ',diff:0.55,src:'bank',status:null},
  {id:5,q:'дёӢеҲ—жқЎд»¶дёӯпјҢдёҚиғҪеҲӨе®ҡдёӨдёӘдёүи§’еҪўе…Ёзӯүзҡ„жҳҜпјҲгҖҖпјү\nA. дёүиҫ№еҜ№еә”зӣёзӯүгҖҖB. дёүи§’еҜ№еә”зӣёзӯүгҖҖC. дёӨиҫ№еҸҠеӨ№и§’еҜ№еә”зӣёзӯүгҖҖD. дёӨи§’еҸҠе…¶еӨ№иҫ№еҜ№еә”зӣёзӯү',kp:'з»јеҗҲеҲӨж–ӯ',diff:0.58,src:'ai',status:null},
];

function render(){
  const kept=questions.filter(q=>q.status==='keep').length;
  const total=questions.length;
  let h='';
  questions.forEach((q,i)=>{
    const cls=q.status==='keep'?'kept':q.status==='replace'?'replaced':q.status==='remove'?'removed':'';
    h+=`<div class="item ${cls}">
      <div class="q"><span class="num">${q.id}.</span>${q.q.replace(/\n/g,'<br>')}</div>
      <div class="meta">
        <span>${q.kp}</span>
        <span>йҡҫеәҰ ${q.diff}</span>
        <span class="${q.src==='bank'?'src-bank':'src-ai'}">${q.src==='bank'?'йўҳеә“':'AI еҺҹеҲӣ'}</span>
      </div>
      <div class="acts">
        <button class="keep${q.status==='keep'?' active':''}" onclick="setStatus(${i},'keep')">дҝқз•ҷ</button>
        <button class="replace${q.status==='replace'?' active':''}" onclick="setStatus(${i},'replace')">жӣҝжҚў</button>
        <button onclick="alert('еҫ®и°ғ: еј№еҮәзј–иҫ‘жЎҶдҝ®ж”№йўҳзӣ®ж–Үжң¬')">еҫ®и°ғ</button>
        <button class="remove${q.status==='remove'?' active':''}" onclick="setStatus(${i},'remove')">еҲ йҷӨ</button>
      </div>
    </div>`;
  });
  h+=`<div class="footer">
    <div class="counter"><b>${kept}</b> / ${total} йўҳе·ІзЎ®и®Ө</div>
    <div class="footer-actions">
      <button class="btn" onclick="questions.forEach(q=>q.status='keep');render()">е…ЁйғЁдҝқз•ҷ</button>
      <button class="btn pri" onclick="alert('submitToEngine: жҸҗдәӨе®Ўж ёз»“жһң')">зЎ®и®Өз»„еҚ· &#8599;</button>
    </div>
  </div>`;
  document.getElementById('items').innerHTML=h;
}
function setStatus(i,s){questions[i].status=questions[i].status===s?null:s;render()}
render();
</script>
</body>
</html>
