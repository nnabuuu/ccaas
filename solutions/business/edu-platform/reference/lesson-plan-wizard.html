<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即见教育 · 备课向导原型</title>
<style>
:root{--bg1:#fff;--bg2:#f5f5f0;--t1:#1a1a1a;--t2:#6b6b65;--t3:#9c9a92;--b1:rgba(0,0,0,.15);--b2:rgba(0,0,0,.08);--success-t:#27500A;--warn-bg:#FAEEDA;--warn-t:#854F0B;--danger-t:#A32D2D;--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--bg1:#1a1a18;--bg2:#242422;--t1:#e8e6dc;--t2:#9c9a92;--t3:#73726c;--b1:rgba(255,255,255,.12);--b2:rgba(255,255,255,.06);--success-t:#C0DD97;--warn-bg:#412402;--warn-t:#FAC775;--danger-t:#F09595}}
*{box-sizing:border-box;margin:0}body{font-family:-apple-system,system-ui,"Segoe UI",sans-serif;background:var(--bg2);color:var(--t1);display:flex;justify-content:center;padding:20px;min-height:100vh}
.lp{width:100%;max-width:680px}
.lp-frame{background:var(--bg1);border-radius:var(--rl);padding:20px;border:.5px solid var(--b1)}
.lp-title{font-size:18px;font-weight:500;margin-bottom:16px}
.lp-steps{display:flex;gap:4px;margin-bottom:20px}
.lp-step{flex:1;text-align:center;padding:8px 0;font-size:12px;color:var(--t3);border-bottom:2px solid var(--b1);cursor:pointer;transition:all .2s}
.lp-step.act{color:var(--t1);font-weight:500;border-color:var(--t1)}
.lp-step.done{color:var(--success-t);border-color:var(--success-t)}
.lp-panel{display:none}.lp-panel.vis{display:block}
.lp-row{display:flex;gap:12px;margin-bottom:14px}
.lp-field{flex:1}
.lp-label{font-size:12px;color:var(--t2);margin-bottom:4px}
.lp-sel{width:100%;padding:7px 10px;border:.5px solid var(--b1);border-radius:var(--r);font-size:13px;background:var(--bg1);color:var(--t1);font-family:inherit}
.lp-tree{border:.5px solid var(--b1);border-radius:var(--rl);padding:10px 14px;max-height:240px;overflow-y:auto}
.lp-node{padding:3px 0;font-size:13px}
.lp-node-h{cursor:pointer;display:flex;align-items:center;gap:6px;padding:3px 4px;border-radius:4px}
.lp-node-h:hover{background:var(--bg2)}
.lp-caret{width:14px;height:14px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--t3);transition:transform .15s;flex-shrink:0}
.lp-caret.open{transform:rotate(90deg)}
.lp-cb{width:14px;height:14px;border-radius:3px;border:1px solid var(--b1);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.lp-cb.on{background:var(--t1);border-color:var(--t1)}
.lp-cb.on::after{content:'';display:block;width:7px;height:4px;border-left:1.5px solid var(--bg1);border-bottom:1.5px solid var(--bg1);transform:rotate(-45deg) translateY(-1px)}
.lp-children{padding-left:20px;display:none}.lp-children.open{display:block}
.lp-gap{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--r);margin-bottom:8px;font-size:13px;border:.5px solid var(--b1)}
.lp-gap-bar{flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.lp-gap-fill{height:100%;border-radius:3px}
.lp-gap-name{width:140px;flex-shrink:0}
.lp-gap-pct{width:42px;text-align:right;flex-shrink:0;font-size:12px;font-weight:500}
.lp-gap-tog{width:16px;height:16px;border-radius:3px;border:1px solid var(--b1);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:11px}
.lp-gap-tog.on{background:var(--warn-bg);border-color:var(--warn-t);color:var(--warn-t)}
.lp-gap-tog.on::after{content:'!';font-weight:500}
.lp-hint{font-size:12px;color:var(--t3);margin-top:6px;line-height:1.5}
.lp-summary{background:var(--bg2);border-radius:var(--rl);padding:14px 16px;margin-bottom:14px}
.lp-sum-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.lp-sum-k{color:var(--t2)}.lp-sum-v{font-weight:500}
.lp-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;margin:2px;background:var(--warn-bg);color:var(--warn-t)}
.lp-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.lp-actions button{font-size:13px;padding:7px 16px;border-radius:var(--r);cursor:pointer;border:.5px solid var(--b1);background:transparent;color:var(--t2);font-family:inherit}
.lp-actions button.primary{background:var(--t1);color:var(--bg1);border-color:var(--t1)}
.lp-actions button:disabled{opacity:.4;cursor:not-allowed}
.lp-label2{font-size:10px;text-align:center;color:var(--t3);padding:12px 0 4px}
</style>
</head>
<body>
<div class="lp">
<div class="lp-label2">即见教育 · 备课向导原型 · 可完整交互</div>
<div class="lp-frame">
  <div class="lp-title">备课向导</div>
  <div class="lp-steps" id="steps"></div>
  <div class="lp-panel" id="p0"></div>
  <div class="lp-panel" id="p1"></div>
  <div class="lp-panel" id="p2"></div>
  <div class="lp-panel" id="p3"></div>
</div>
</div>
<script>
const stepNames=['选择范围','选择章节','学情分析','确认生成'];
let cur=0;
const sel={subject:'math',grade:'G8-1',cls:'class_2',chapters:[],gaps:[],lessonType:'new',duration:45};
const chapters={
  'ch11':{label:'第11章 三角形',children:{'11.1':{label:'11.1 与三角形有关的线段'},'11.2':{label:'11.2 与三角形有关的角'},'11.3':{label:'11.3 多边形及其内角和'}}},
  'ch12':{label:'第12章 全等三角形',children:{'12.1':{label:'12.1 全等三角形'},'12.2':{label:'12.2 三角形全等的判定'},'12.3':{label:'12.3 角的平分线的性质'}}},
  'ch13':{label:'第13章 轴对称',children:{'13.1':{label:'13.1 轴对称'},'13.2':{label:'13.2 画轴对称图形'},'13.3':{label:'13.3 等腰三角形'}}},
  'ch14':{label:'第14章 整式的乘法与因式分解',children:{'14.1':{label:'14.1 整式的乘法'},'14.2':{label:'14.2 乘法公式'},'14.3':{label:'14.3 因式分解'}}}
};
const gapData={
  '12.2':[{kp:'SSS 判定',rate:42,id:'g1'},{kp:'SAS 判定',rate:35,id:'g2'},{kp:'ASA / AAS 综合',rate:28,id:'g3'}],
  '11.2':[{kp:'三角形内角和定理',rate:18,id:'g4'},{kp:'外角定理应用',rate:31,id:'g5'}],
  '12.3':[{kp:'角平分线逆定理',rate:38,id:'g6'}],
  '14.3':[{kp:'提取公因式',rate:22,id:'g7'},{kp:'十字相乘法',rate:45,id:'g8'}]
};
function renderSteps(){
  document.getElementById('steps').innerHTML=stepNames.map((s,i)=>`<div class="lp-step${i===cur?' act':i<cur?' done':''}" onclick="goStep(${i})">${i<cur?'&#10003; ':''}${s}</div>`).join('');
  [0,1,2,3].forEach(i=>document.getElementById('p'+i).className='lp-panel'+(i===cur?' vis':''));
}
function renderP0(){
  document.getElementById('p0').innerHTML=`
    <div class="lp-row"><div class="lp-field"><div class="lp-label">学科</div><select class="lp-sel" onchange="sel.subject=this.value"><option value="math">数学</option><option value="chinese">语文</option><option value="english">英语</option><option value="physics">物理</option></select></div>
    <div class="lp-field"><div class="lp-label">年级学期</div><select class="lp-sel" onchange="sel.grade=this.value"><option value="G7-1">七年级上</option><option value="G7-2">七年级下</option><option value="G8-1" selected>八年级上</option><option value="G8-2">八年级下</option><option value="G9-1">九年级上</option></select></div>
    <div class="lp-field"><div class="lp-label">班级</div><select class="lp-sel" onchange="sel.cls=this.value"><option value="class_1">八(1)班</option><option value="class_2" selected>八(2)班</option><option value="class_3">八(3)班</option><option value="class_4">八(4)班</option></select></div></div>
    <div class="lp-row"><div class="lp-field"><div class="lp-label">课型</div><select class="lp-sel" onchange="sel.lessonType=this.value"><option value="new">新授课</option><option value="review">复习课</option><option value="exercise">练习课</option><option value="lab">实验探究课</option></select></div>
    <div class="lp-field"><div class="lp-label">课时 (分钟)</div><select class="lp-sel" onchange="sel.duration=+this.value"><option value="40">40</option><option value="45" selected>45</option><option value="90">90 (连堂)</option></select></div></div>
    <div class="lp-actions"><button class="primary" onclick="goStep(1)">选择章节 &rarr;</button></div>`;
}
function renderP1(){
  let h='<div class="lp-label" style="margin-bottom:8px">人教版八年级上册 · 点击展开章节，勾选要备课的小节</div><div class="lp-tree">';
  for(const[cid,ch]of Object.entries(chapters)){
    const open=Object.keys(ch.children).some(k=>sel.chapters.includes(k));
    h+=`<div class="lp-node"><div class="lp-node-h" onclick="toggleCh('${cid}')"><span class="lp-caret${open?' open':''}" id="car_${cid}">&#9654;</span><span>${ch.label}</span></div><div class="lp-children${open?' open':''}" id="ch_${cid}">`;
    for(const[sid,sec]of Object.entries(ch.children)){const on=sel.chapters.includes(sid);h+=`<div class="lp-node"><div class="lp-node-h" onclick="toggleSec('${sid}')"><span class="lp-cb${on?' on':''}" id="cb_${sid}"></span><span>${sec.label}</span></div></div>`}
    h+=`</div></div>`}
  h+='</div>';
  if(sel.chapters.length)h+=`<div class="lp-hint">已选: ${sel.chapters.map(c=>{for(const ch of Object.values(chapters))if(ch.children[c])return ch.children[c].label;return c}).join(', ')}</div>`;
  h+=`<div class="lp-actions"><button onclick="goStep(0)">&larr; 上一步</button><button class="primary" onclick="goStep(2)"${sel.chapters.length?'':' disabled'}>查看学情 &rarr;</button></div>`;
  document.getElementById('p1').innerHTML=h;
}
function toggleCh(cid){const el=document.getElementById('ch_'+cid),car=document.getElementById('car_'+cid);el.classList.toggle('open');car.classList.toggle('open')}
function toggleSec(sid){const i=sel.chapters.indexOf(sid);if(i>=0)sel.chapters.splice(i,1);else sel.chapters.push(sid);renderP1()}
function renderP2(){
  let gaps=[];sel.chapters.forEach(sid=>{if(gapData[sid])gaps.push(...gapData[sid])});
  if(!gaps.length)sel.chapters.forEach(sid=>{gaps.push({kp:Object.values(chapters).flatMap(c=>c.children[sid]?[c.children[sid].label]:[]).join()||sid,rate:Math.round(Math.random()*20+5),id:'a_'+sid})});
  sel.gaps=gaps.map(g=>({...g,emphasize:g.rate>=30}));
  let h=`<div class="lp-label" style="margin-bottom:8px">学情 MCP 返回 · 八(2)班近 30 天错题数据 · 点击 ! 标记重点关注</div>`;
  sel.gaps.forEach((g,i)=>{const c=g.rate>=35?'var(--danger-t)':g.rate>=25?'var(--warn-t)':'var(--success-t)';h+=`<div class="lp-gap"><span class="lp-gap-name">${g.kp}</span><div class="lp-gap-bar"><div class="lp-gap-fill" style="width:${g.rate}%;background:${c}"></div></div><span class="lp-gap-pct" style="color:${c}">${g.rate}%</span><span class="lp-gap-tog${g.emphasize?' on':''}" onclick="togGap(${i})" title="标记为重点关注"></span></div>`});
  h+=`<div class="lp-hint">错误率 = 该知识点相关题目的班级平均错误率。标记为重点的知识点将获得额外教学时间。</div>`;
  h+=`<div class="lp-actions"><button onclick="goStep(1)">&larr; 上一步</button><button class="primary" onclick="goStep(3)">确认生成 &rarr;</button></div>`;
  document.getElementById('p2').innerHTML=h;
}
function togGap(i){sel.gaps[i].emphasize=!sel.gaps[i].emphasize;renderP2()}
function renderP3(){
  const chLabels=sel.chapters.map(c=>{for(const ch of Object.values(chapters))if(ch.children[c])return ch.children[c].label;return c});
  const em=sel.gaps.filter(g=>g.emphasize);
  const tl={new:'新授课',review:'复习课',exercise:'练习课',lab:'实验探究课'}[sel.lessonType];
  let h=`<div class="lp-summary">
    <div class="lp-sum-row"><span class="lp-sum-k">学科 / 年级</span><span class="lp-sum-v">数学 · 八年级上</span></div>
    <div class="lp-sum-row"><span class="lp-sum-k">班级</span><span class="lp-sum-v">八(2)班</span></div>
    <div class="lp-sum-row"><span class="lp-sum-k">课型 / 时长</span><span class="lp-sum-v">${tl} · ${sel.duration} 分钟</span></div>
    <div class="lp-sum-row"><span class="lp-sum-k">教学内容</span><span class="lp-sum-v">${chLabels.join('、')}</span></div>
    <div class="lp-sum-row"><span class="lp-sum-k">重点关注</span><span class="lp-sum-v">${em.length?em.map(g=>`<span class="lp-tag">${g.kp} ${g.rate}%</span>`).join(''):'无特别关注'}</span></div>
  </div>`;
  h+=`<div style="background:var(--bg2);border-radius:var(--r);padding:12px;font-size:12px;color:var(--t2);font-family:monospace;line-height:1.6;white-space:pre-wrap;margin-bottom:14px">// submitToEngine 传出的结构化参数
{
  "skill": "lesson-plan-generator",
  "params": {
    "subject": "math",
    "grade": "${sel.grade}",
    "class_id": "${sel.cls}",
    "lesson_type": "${sel.lessonType}",
    "duration": ${sel.duration},
    "chapters": ${JSON.stringify(chLabels)},
    "emphasis": ${JSON.stringify(em.map(g=>({kp:g.kp,error_rate:g.rate/100})))}
  }
}</div>`;
  h+=`<div class="lp-actions"><button onclick="goStep(2)">&larr; 上一步</button><button class="primary" onclick="alert('submitToEngine() → Jijian Agentic 引擎生成教案')">生成教案</button></div>`;
  document.getElementById('p3').innerHTML=h;
}
function goStep(n){cur=n;renderSteps();[renderP0,renderP1,renderP2,renderP3][n]()}
goStep(0);
</script>
</body>
</html>
