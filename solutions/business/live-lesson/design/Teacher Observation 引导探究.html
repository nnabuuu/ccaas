<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Teacher Observation · 引导探究 平方差公式</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap');

html,body { margin:0; height:100%; overflow:hidden; }
.app { display:flex; flex-direction:column; height:100vh; background:var(--bg); color:var(--t1); font-variant-numeric:tabular-nums; }

/* ═══ Band ═══ */
.band { display:flex; align-items:center; height:48px; padding:0 24px; gap:20px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.band-mark { width:22px; height:22px; border-radius:6px; background:var(--t1); color:var(--surface); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; }
.band-title { font-size:13px; font-weight:600; }
.band-class { font-size:12px; color:var(--t2); padding-left:10px; border-left:1px solid rgba(28,28,26,.14); }
.band-step { display:flex; align-items:center; gap:6px; margin-left:auto; font-size:12px; color:var(--t2); }
.band-step .lb { font-size:10px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:.5px; }
.band-step .num { font-size:13px; font-weight:700; color:var(--t1); }
.band-step .sep { color:var(--t3); margin:0 4px; }
.band-step .sl { color:var(--t3); margin:0 2px; }
.band-step .tot { font-size:13px; font-weight:600; color:var(--t2); }

/* ═══ Body grid ═══ */
.body { flex:1; display:grid; grid-template-columns:1fr 340px; min-height:0; }

/* ── Focus Column ── */
.focus { padding:22px 28px; overflow-y:auto; }

.hero { display:flex; align-items:flex-end; gap:20px; padding-bottom:16px; border-bottom:1px solid var(--border); margin-bottom:20px; }
.hero-main { flex:1; }
.hero-eyebrow { display:flex; align-items:center; gap:8px; font-size:11px; font-weight:600; color:var(--t2); margin-bottom:8px; }
.hero-eyebrow .pill { background:var(--teal); color:#fff; padding:2px 8px; border-radius:3px; font-size:10px; letter-spacing:.3px; }
.hero-title { font-size:28px; font-weight:700; letter-spacing:-.5px; line-height:1.1; margin-bottom:6px; }
.hero-title .en { color:var(--t3); font-weight:500; font-size:18px; letter-spacing:-.2px; margin-left:10px; }
.hero-brief { font-size:13px; color:var(--t2); line-height:1.6; max-width:720px; }
.hero-brief strong { color:var(--t1); font-weight:600; }
.hero-side { display:flex; gap:20px; align-items:baseline; flex-shrink:0; padding-left:20px; border-left:1px solid var(--border); }
.hs-pair { display:flex; flex-direction:column; gap:3px; }
.hs-lb { font-size:10px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:.5px; }
.hs-v { display:inline-flex; align-items:baseline; gap:3px; }
.hs-v .n { font-size:20px; font-weight:700; color:var(--t1); line-height:1; }
.hs-v .sl { color:var(--t3); }
.hs-v .tot { font-size:14px; font-weight:600; color:var(--t2); }

/* Section headers */
.section-hd { display:flex; align-items:baseline; gap:8px; margin-bottom:10px; }
.section-label { font-size:10px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:.5px; }
.section-meta { font-size:11px; color:var(--t3); margin-left:auto; }

.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px 18px; }

/* ═══ Funnel ═══ */
.funnel { display:flex; flex-direction:column; gap:10px; }
.funnel-row { display:flex; align-items:center; gap:10px; }
.funnel-label { display:flex; align-items:center; gap:6px; width:60px; flex-shrink:0; }
.funnel-num { width:20px; height:20px; border-radius:50%; background:var(--teal-bg); color:var(--teal); font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; }
.funnel-name { font-size:11px; font-weight:500; color:var(--t2); }
.funnel-bar-wrap { flex:1; height:12px; background:var(--surface2); border-radius:6px; overflow:hidden; position:relative; }
.funnel-bar { height:100%; border-radius:6px; position:absolute; top:0; transition:width .6s ease; }
.funnel-passed { background:var(--green); left:0; }
.funnel-current { background:var(--blue); }
.funnel-nums { display:flex; align-items:baseline; gap:4px; width:60px; flex-shrink:0; }
.funnel-pass-n { font-size:13px; font-weight:700; color:var(--green); }
.funnel-curr-n { font-size:11px; font-weight:600; color:var(--blue); }
.funnel-legend { display:flex; gap:14px; margin-top:4px; padding-top:6px; }
.funnel-leg-item { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--t3); font-weight:500; }
.funnel-leg-dot { width:8px; height:8px; border-radius:3px; }
.funnel-leg-dot.passed { background:var(--green); }
.funnel-leg-dot.current { background:var(--blue); }

/* ═══ Step Detail Cards ═══ */
.step-details { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.sd-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
.sd-hd { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.sd-num { width:20px; height:20px; border-radius:50%; background:var(--teal); color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.sd-name { font-size:12px; font-weight:600; color:var(--t1); flex:1; }
.sd-stat { display:flex; gap:6px; }
.sd-pass { font-size:10px; font-weight:600; color:var(--green); background:var(--green-bg); padding:2px 6px; border-radius:3px; }
.sd-curr { font-size:10px; font-weight:600; color:var(--blue); background:var(--blue-bg); padding:2px 6px; border-radius:3px; }
.sd-retry-info { font-size:11px; color:var(--amber); margin-bottom:4px; }
.sd-retry-badge { font-size:10px; font-weight:600; padding:2px 6px; border-radius:3px; background:var(--amber-bg); color:var(--amber); }
.sd-errors { display:flex; flex-direction:column; gap:4px; }
.sd-err-row { display:flex; align-items:flex-start; gap:6px; font-size:11px; color:var(--t2); line-height:1.5; padding:4px 0; }
.sd-err-badge { font-size:9px; font-weight:700; padding:1px 5px; border-radius:3px; background:var(--red-bg); color:var(--red); flex-shrink:0; }
.sd-err-desc { flex:1; }
.sd-err-names { font-size:10px; color:var(--t3); flex-shrink:0; }
.sd-ok { font-size:11px; color:var(--t3); font-style:italic; }

/* ═══ Teacher suggestion ═══ */
.teacher-line { background:var(--t1); color:rgba(240,239,232,.96); border-radius:12px; padding:18px 20px; margin-bottom:20px; }
.teacher-line .line-lb { font-size:10px; font-weight:600; color:rgba(240,239,232,.5); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
.teacher-line .line-text { font-size:14px; line-height:1.65; font-weight:500; }
.teacher-line .line-text strong { color:#f0efe8; }
.teacher-line .k { background:rgba(196,138,30,.22); color:#f0c56c; padding:1px 5px; border-radius:3px; font-weight:600; }

/* ═══ Actions ═══ */
.actions { display:flex; gap:8px; padding-top:16px; border-top:1px solid var(--border); }
.btn { font-size:13px; padding:9px 16px; border-radius:7px; cursor:pointer; border:1px solid rgba(28,28,26,.14); background:var(--surface); color:var(--t1); font-family:inherit; font-weight:500; }
.btn:hover { background:var(--surface2); }
.btn.pri { background:var(--t1); color:var(--surface); border-color:var(--t1); }
.btn.pri:hover { opacity:.9; }
.btn.ghost { background:transparent; border-color:transparent; color:var(--t2); }
.btn.ghost:hover { background:var(--surface2); color:var(--t1); }

/* ═══ Overview Column ═══ */
.overview { border-left:1px solid var(--border); background:var(--surface); display:flex; flex-direction:column; overflow:hidden; }
.pulse { display:grid; grid-template-columns:repeat(3,1fr); padding:14px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
.pulse-cell { padding:0 10px; border-left:1px solid var(--border); }
.pulse-cell:first-child { border-left:0; padding-left:2px; }
.pulse-n { font-size:22px; font-weight:700; line-height:1; letter-spacing:-.4px; color:var(--t1); margin-bottom:5px; }
.pulse-row { display:flex; align-items:center; gap:5px; }
.pulse-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.pulse-dot.done { background:#8a8a80; }
.pulse-dot.prog { background:var(--t1); }
.pulse-dot.idle { background:#bcbab2; }
.pulse-lb { font-size:10px; color:var(--t2); font-weight:500; text-transform:uppercase; letter-spacing:.3px; }

.q-filter { display:flex; align-items:center; gap:6px; padding:10px 14px; border-bottom:1px solid var(--border); flex-shrink:0; }
.q-chip { font-size:10px; padding:4px 9px; border-radius:10px; background:var(--bg); border:1px solid var(--border); color:var(--t2); cursor:pointer; white-space:nowrap; font-weight:600; font-family:inherit; display:inline-flex; align-items:center; gap:3px; }
.q-chip.act { background:var(--t1); color:var(--surface); border-color:var(--t1); }
.q-chip:hover:not(.act) { background:var(--surface2); }
.chip-n { opacity:.7; }

.stu-scroll { flex:1; overflow-y:auto; padding:4px 8px 8px; }
.stu-list { display:flex; flex-direction:column; gap:2px; }
.sl-row { display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:6px; cursor:pointer; font-size:12px; transition:background .12s; }
.sl-row:hover { background:var(--bg); }
.sl-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.sl-dot.done { background:#8a8a80; }
.sl-dot.prog { background:var(--t1); }
.sl-dot.idle { background:transparent; border:1px solid #bcbab2; }
.sl-name { flex:1; font-weight:500; color:var(--t1); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sl-row.idle .sl-name { color:var(--t3); }
.sl-ok { color:var(--green); font-weight:700; font-size:11px; }
.sl-step-tag { font-size:9px; font-weight:600; padding:2px 6px; border-radius:3px; background:var(--blue-bg); color:var(--blue); }
.sl-err-dot { color:var(--red); font-size:8px; }

/* ═══ Modal ═══ */
.overlay { position:fixed; inset:0; background:rgba(28,28,26,.5); display:none; align-items:center; justify-content:center; padding:32px; z-index:100; }
.overlay.open { display:flex; }
.modal { background:var(--bg); border-radius:14px; width:100%; max-width:920px; max-height:88vh; display:flex; flex-direction:column; overflow:hidden; }
.mod-hd { display:flex; align-items:center; gap:14px; padding:16px 24px; border-bottom:1px solid var(--border); background:var(--surface); }
.mod-av { width:36px; height:36px; border-radius:8px; background:var(--t1); color:var(--surface); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; }
.mod-ti { flex:1; }
.mod-ti-n { font-size:15px; font-weight:600; }
.mod-ti-m { font-size:11px; color:var(--t3); margin-top:2px; }
.mod-cls { cursor:pointer; padding:6px 12px; font-size:12px; color:var(--t2); border-radius:6px; }
.mod-cls:hover { background:var(--surface2); color:var(--t1); }
.mod-body { flex:1; overflow:hidden; display:grid; grid-template-columns:1fr 1fr; }
.mod-col { padding:20px 24px; overflow-y:auto; }
.mod-col.right { background:var(--surface); border-left:1px solid var(--border); }
.mod-h { font-size:10px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:12px; }
.mod-section { margin-bottom:20px; }
.mod-empty { font-size:12px; color:var(--t3); font-style:italic; }

/* Modal — step cards */
.mod-step-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:8px; }
.mod-step-card.locked { opacity:.35; }
.mod-step-card.current { border-color:var(--blue); background:var(--blue-bg); }
.mod-step-hd { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.mod-step-num { width:20px; height:20px; border-radius:50%; background:var(--surface2); color:var(--t3); font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.mod-step-num.done { background:var(--green); color:#fff; }
.mod-step-num.active { background:var(--blue); color:#fff; }
.mod-step-label { font-size:12px; font-weight:600; color:var(--t1); flex:1; }
.mod-retry-tag { font-size:9px; font-weight:600; padding:2px 6px; border-radius:3px; background:var(--amber-bg); color:var(--amber); }
.mod-step-body { font-size:12px; color:var(--t2); }
.mod-step-err { font-size:11px; color:var(--red); margin-top:6px; padding:6px 8px; background:rgba(148,41,41,.05); border-radius:4px; }
.mod-err-dot { display:inline-block; width:4px; height:4px; border-radius:50%; background:var(--red); margin-right:4px; vertical-align:middle; }

/* Modal — choices display */
.mod-choices { display:flex; flex-direction:column; gap:3px; }
.mod-choice-row { display:flex; align-items:center; gap:6px; font-size:11px; padding:3px 0; }
.mod-choice-label { color:var(--t3); width:90px; flex-shrink:0; }
.mod-choice-val { font-weight:600; flex:1; }
.mod-choice-row.ok .mod-choice-val { color:var(--green); }
.mod-choice-row.err .mod-choice-val { color:var(--red); }
.mod-choice-icon { font-size:12px; font-weight:700; }
.mod-choice-row.ok .mod-choice-icon { color:var(--green); }
.mod-choice-row.err .mod-choice-icon { color:var(--red); }

.mod-formula { font-size:13px; font-weight:600; color:var(--t1); padding:4px 0; }
.mod-text-ans { font-size:12px; color:var(--t2); line-height:1.6; }

/* Modal — progress visual */
.mod-progress-visual { display:flex; align-items:center; gap:4px; }
.mod-prog-step { display:flex; flex-direction:column; align-items:center; gap:3px; flex:1; }
.mod-prog-dot { width:24px; height:24px; border-radius:50%; background:var(--surface2); border:1.5px solid var(--border); color:var(--t3); font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; }
.mod-prog-step.done .mod-prog-dot { background:var(--green); border-color:var(--green); color:#fff; }
.mod-prog-step.active .mod-prog-dot { background:var(--blue-bg); border-color:var(--blue); color:var(--blue); }
.mod-prog-label { font-size:9px; color:var(--t3); font-weight:500; }
.mod-prog-step.done .mod-prog-label { color:var(--green); }
.mod-prog-step.active .mod-prog-label { color:var(--blue); }

/* Modal — verdict */
.mod-verdict { display:flex; align-items:center; gap:10px; padding:12px 16px; border-radius:10px; margin-bottom:8px; }
.mod-verdict.correct { background:var(--green-bg); }
.verdict-icon { font-size:18px; font-weight:700; }
.mod-verdict.correct .verdict-icon { color:var(--green); }
.verdict-text { font-size:14px; font-weight:600; }
.mod-verdict.correct .verdict-text { color:var(--green); }
.verdict-answer { margin-left:auto; font-size:14px; font-weight:600; color:var(--t2); }

/* Modal — attempts grid */
.mod-attempts-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.mod-att-item { text-align:center; padding:8px 4px; background:var(--bg); border-radius:6px; }
.mod-att-label { display:block; font-size:9px; font-weight:500; color:var(--t3); margin-bottom:3px; text-transform:uppercase; letter-spacing:.3px; }
.mod-att-val { font-size:16px; font-weight:700; color:var(--t1); }
.mod-att-val.retry { color:var(--amber); }

/* Modal — error detail */
.mod-error-detail { font-size:12px; color:var(--red); line-height:1.5; padding:8px 12px; background:rgba(148,41,41,.05); border-radius:6px; margin-bottom:6px; }
.mod-error-detail strong { color:var(--t1); }
.err-dot { display:inline-block; width:4px; height:4px; border-radius:50%; background:var(--red); margin-right:6px; vertical-align:middle; }

/* AI analysis */
.ai-analysis { background:var(--purple-bg); border-radius:8px; padding:12px 14px; font-size:12px; line-height:1.7; color:var(--t2); }
.ai-analysis p { margin:0 0 6px; }
.ai-analysis p:last-child { margin:0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="teacher-gd-app.jsx"></script>
</body>
</html>
