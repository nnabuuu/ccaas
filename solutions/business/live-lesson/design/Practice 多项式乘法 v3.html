<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Practice · 多项式乘法 v3</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
html, body { margin: 0; height: 100%; overflow: hidden; }
.app { display: flex; flex-direction: column; height: 100vh; background: var(--bg); color: var(--t1); }

/* ── Topbar ── */
.topbar { display: flex; align-items: center; justify-content: space-between; height: 48px; padding: 0 20px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-title { font-size: 14px; font-weight: 600; }
.topbar-class { font-size: 12px; color: var(--t3); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.topbar-badge { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 10px; background: var(--blue-bg); color: var(--blue); }
.topbar-timer { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
.topbar-timer-of { font-size: 11px; color: var(--t3); }

/* ── Main row: task + hint panel ── */
.main-row { flex: 1; display: flex; min-height: 0; }

/* ── Task Column ── */
.task-col { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.task-scroll { flex: 1; overflow-y: auto; padding: 28px 32px 64px; max-width: 640px; }
.section-label-row { font-size: 10px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }

/* ═══ Problem Card ═══ */
.problem-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px 28px; margin-bottom: 20px; }
.problem-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.problem-num { font-size: 14px; font-weight: 600; }
.problem-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 3px; background: var(--teal-bg); color: var(--teal); }
.problem-badge.badge-retry { background: var(--amber-bg); color: var(--amber); }
.problem-badge.badge-done { background: var(--green-bg); color: var(--green); }
.problem-text { font-size: 14px; color: var(--t2); margin-bottom: 16px; line-height: 1.6; }
.problem-expr { font-size: 32px; font-weight: 700; letter-spacing: -.5px; text-align: center; padding: 20px 0 12px; }
.expr-paren { color: var(--t3); font-weight: 400; }
.expr-var { color: var(--blue); }
.expr-op { color: var(--t3); font-weight: 400; }
.expr-num { color: var(--teal); }

/* ═══ Input Methods ═══ */
.input-methods { display: flex; gap: 10px; margin-bottom: 16px; }
.im-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 16px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--t2); font-family: inherit; transition: all .15s; }
.im-btn:hover { border-color: var(--t3); color: var(--t1); background: var(--surface2); }
.im-btn.active { border-color: var(--teal); background: var(--teal-bg); color: var(--teal); }
.im-btn.active svg { stroke: var(--teal); }

/* ═══ Handwriting Canvas ═══ */
.hw-collapsed { display: flex; align-items: center; gap: 8px; padding: 16px 20px; margin-bottom: 16px; background: var(--surface); border: 1.5px dashed var(--border); border-radius: 10px; cursor: pointer; font-size: 13px; color: var(--t3); font-weight: 500; transition: all .15s; }
.hw-collapsed:hover { border-color: var(--t3); color: var(--t2); background: var(--surface2); }
.hw-area { margin-bottom: 16px; border-radius: 10px; border: 1px solid var(--border); overflow: hidden; background: var(--surface); animation: slideDown .3s ease; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.hw-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--border); }
.hw-tools { display: flex; align-items: center; gap: 4px; }
.hw-btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; border-radius: 6px; border: 1px solid transparent; background: transparent; font-size: 11px; font-weight: 500; color: var(--t2); cursor: pointer; font-family: inherit; transition: all .12s; }
.hw-btn:hover { background: var(--surface2); color: var(--t1); }
.hw-btn.active { background: var(--t1); color: var(--surface); border-color: var(--t1); }
.hw-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
.hw-collapse { margin-left: auto; color: var(--t3); }
/* Vertical page scroll */
.hw-pages-scroll {
  max-height: 420px; overflow-y: auto; background: var(--bg);
  scroll-behavior: smooth;
}
.hw-page-block {
  border-left: 3px solid transparent;
  transition: border-color .15s;
}
.hw-page-block.active { border-left-color: var(--teal); }
.hw-page-block + .hw-page-block { border-top: 1px dashed var(--border); }
.hw-page-hd {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px; background: var(--surface);
}
.hw-page-num { font-size: 10px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: .3px; flex: 1; }
.hw-page-block.active .hw-page-num { color: var(--teal); }
.hw-page-del {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 4px;
  border: none; background: transparent;
  font-size: 10px; color: var(--t3); cursor: pointer;
  font-family: inherit; opacity: 0; transition: all .12s;
}
.hw-page-block:hover .hw-page-del { opacity: 1; }
.hw-page-del:hover { background: var(--red-bg); color: var(--red); }
.hw-page-del svg { stroke: currentColor; }

/* (hw-add-bottom removed — replaced by hw-add-row in v3) */

.hw-active-hint {
  font-size: 10px; color: var(--teal); font-weight: 500;
  margin-left: 8px; padding: 2px 8px;
  background: var(--teal-bg); border-radius: 3px;
}

.hw-canvas-wrap { background-color: #fbfaf7; background-image: linear-gradient(rgba(28,28,26,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(28,28,26,.04) 1px, transparent 1px); background-size: 24px 24px; }
.hw-canvas-wrap canvas { display: block; width: 100%; height: auto; cursor: crosshair; }

/* Photo page inside handwriting area */
.hw-photo-wrap {
  position: relative; padding: 12px 14px;
  background: var(--bg); min-height: 120px;
  display: flex; align-items: center; justify-content: center;
}
.hw-photo-wrap img {
  max-width: 100%; max-height: 400px;
  border-radius: 8px; border: 1px solid var(--border);
  object-fit: contain; display: block;
}
.hw-photo-wrap .hw-photo-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 32px 20px;
  border: 1.5px dashed var(--border); border-radius: 10px;
  cursor: pointer; transition: all .15s; background: var(--surface);
}
.hw-photo-wrap .hw-photo-empty:hover { border-color: var(--teal); background: var(--teal-bg); }
.hw-photo-empty-text { font-size: 12px; color: var(--t3); font-weight: 500; }
.hw-photo-empty:hover .hw-photo-empty-text { color: var(--teal); }

.hw-page-type-badge {
  font-size: 9px; font-weight: 500; padding: 1px 6px; border-radius: 3px;
  margin-left: 4px;
}
.hw-page-type-badge.type-canvas { background: var(--teal-bg); color: var(--teal); }
.hw-page-type-badge.type-photo  { background: var(--blue-bg); color: var(--blue); }

/* Bottom add buttons — two side-by-side */
.hw-add-row {
  display: flex; gap: 8px; padding: 8px 14px 14px;
}
.hw-add-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 14px 8px; border: 1.5px dashed var(--border); border-radius: 8px;
  cursor: pointer; transition: all .15s; background: transparent;
  font-family: inherit;
}
.hw-add-btn:hover { border-color: var(--teal); background: var(--teal-bg); }
.hw-add-btn svg { color: var(--t3); }
.hw-add-btn:hover svg { color: var(--teal); stroke: var(--teal); }
.hw-add-btn span { font-size: 12px; color: var(--t3); font-weight: 500; }
.hw-add-btn:hover span { color: var(--teal); }

/* ═══ (legacy photo standalone — kept for compat) ═══ */
.photo-area { margin-bottom: 16px; }
.photo-dropzone { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 32px 20px; border-radius: 10px; border: 1.5px dashed var(--border); background: var(--surface); cursor: pointer; transition: all .15s; }
.photo-dropzone:hover, .photo-dropzone.drag-over { border-color: var(--teal); background: var(--teal-bg); }
.photo-dz-text { font-size: 13px; font-weight: 500; color: var(--t2); }
.photo-dz-hint { font-size: 11px; color: var(--t3); }
.photo-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
.photo-thumb { position: relative; width: 100px; height: 100px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
.photo-rm { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border-radius: 4px; background: rgba(28,28,26,.65); color: #fff; border: none; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .12s; }
.photo-thumb:hover .photo-rm { opacity: 1; }

/* ═══ Submit Button ═══ */
.submit-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--t1); color: var(--surface); font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; margin-bottom: 16px; transition: all .15s; }
.submit-btn:hover { opacity: .85; }

/* ═══ Checking State ═══ */
.checking-card {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px; border-radius: 10px;
  background: var(--purple-bg); border: 1px solid rgba(58,49,133,.12);
  font-size: 13px; font-weight: 500; color: var(--purple);
  margin-bottom: 16px;
  animation: slideDown .3s ease;
}
.checking-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--purple);
  animation: pulse 1.2s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

/* ═══ Result Cards ═══ */
.result-card {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 16px 18px; border-radius: 10px;
  margin-bottom: 12px;
  animation: slideDown .3s ease;
}
.result-wrong {
  background: var(--red-bg); border: 1px solid rgba(148,41,41,.12);
}
.result-final {
  background: var(--amber-bg); border: 1px solid rgba(122,77,14,.12);
}
.result-icon {
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; flex-shrink: 0;
}
.result-wrong .result-icon { background: var(--red); color: #fff; }
.result-final .result-icon { background: var(--amber); color: #fff; }
.result-title { font-size: 13px; font-weight: 600; color: var(--t1); margin-bottom: 2px; }
.result-wrong .result-title { color: var(--red); }
.result-final .result-title { color: var(--amber); }
.result-desc { font-size: 12px; color: var(--t2); line-height: 1.5; }

/* Retry button */
.retry-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 12px; border-radius: 8px;
  border: 1.5px solid var(--border); background: var(--surface);
  font-size: 13px; font-weight: 600; color: var(--t1);
  cursor: pointer; font-family: inherit; margin-bottom: 16px;
  transition: all .15s;
}
.retry-btn:hover { background: var(--surface2); border-color: var(--t3); }
.retry-btn svg { stroke: var(--t2); }

/* Next button */
.next-btn {
  width: 100%; padding: 12px; border-radius: 8px;
  border: none; background: var(--t1); color: var(--surface);
  font-size: 13px; font-weight: 600; font-family: inherit;
  cursor: pointer; margin-bottom: 16px;
  transition: opacity .15s;
}
.next-btn:hover { opacity: .85; }

/* Passed */
.passed-card {
  display: flex; align-items: center; justify-content: center;
  padding: 16px; border-radius: 10px;
  background: var(--green-bg); border: 1px solid rgba(45,102,18,.15);
  color: var(--green); font-size: 14px; font-weight: 600;
  animation: slideDown .3s ease;
}

/* Reopen link */
.reopen-link {
  display: block; width: 100%; text-align: center;
  padding: 10px; margin-bottom: 16px;
  background: none; border: none;
  font-size: 12px; font-weight: 500; color: var(--purple);
  cursor: pointer; font-family: inherit;
  transition: color .12s;
}
.reopen-link:hover { color: var(--t1); }

/* ═══ Hint Panel (right) ═══ */
.hint-panel {
  width: 380px; flex-shrink: 0;
  background: var(--surface); border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  animation: panelSlideIn .35s ease;
}
@keyframes panelSlideIn { from { width: 0; opacity: 0; } to { width: 380px; opacity: 1; } }
.hint-panel-hd { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.hint-panel-icon { width: 22px; height: 22px; border-radius: 5px; background: var(--purple-bg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.hint-panel-title { font-size: 12px; font-weight: 600; color: var(--purple); flex: 1; }
.hint-panel-badge { font-size: 10px; padding: 2px 8px; border-radius: 3px; background: var(--purple-bg); color: var(--purple); font-weight: 500; }
.hint-panel-close { font-size: 12px; color: var(--t3); cursor: pointer; padding: 4px 8px; border-radius: 3px; }
.hint-panel-close:hover { color: var(--t1); background: var(--surface2); }
.hint-panel-scroll { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

/* Hint Cards */
.hint-card { background: var(--purple-bg); border: 1px solid rgba(58,49,133,.12); border-radius: 10px; padding: 16px 18px; }
.hint-enter { animation: hintIn .4s ease both; }
@keyframes hintIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.hint-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.hint-step-badge { width: 22px; height: 22px; border-radius: 6px; background: var(--purple); color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.hint-step-badge.badge-amber { background: var(--amber); }
.hint-title { font-size: 12px; font-weight: 600; color: var(--purple); }
.hint-body { font-size: 13px; color: var(--t2); line-height: 1.7; }
.hint-body p { margin: 0 0 6px; color: var(--t2); }
.hint-body p:last-child { margin-bottom: 0; }
.hint-body strong { color: var(--t1); font-weight: 600; }
.hl-expr { display: inline-block; background: var(--teal-bg); color: var(--teal); padding: 1px 6px; border-radius: 4px; font-weight: 600; }
.hint-card-solution { background: var(--amber-bg); border-color: rgba(122,77,14,.12); }
.hint-card-solution .hint-title { color: var(--amber); }

/* ═══ Formula ═══ */
.formula-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin: 4px 0; }
.formula-label-row { margin-bottom: 8px; }
.formula-rule-label { font-size: 10px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: .4px; }
.formula-main { font-size: 22px; font-weight: 600; text-align: center; padding: 6px 0; letter-spacing: .5px; }
.fp { color: var(--t3); font-weight: 400; }
.fo { color: var(--t3); font-weight: 400; margin: 0 2px; }
.fv { display: inline-block; padding: 1px 4px; border-radius: 4px; transition: all .35s ease; font-style: italic; }
.fv.fv-dim { opacity: .25; }
.fv.fv-done { opacity: 1; }
.fv.pair-blue   { background: var(--blue-bg);  color: var(--blue); }
.fv.pair-green  { background: var(--green-bg); color: var(--green); }
.fv.pair-amber  { background: var(--amber-bg); color: var(--amber); }
.fv.pair-coral  { background: var(--coral-bg); color: var(--coral); }
.formula-expand { text-align: center; font-size: 18px; font-weight: 600; padding: 8px 0 4px; min-height: 32px; }
.feq { color: var(--t3); font-weight: 400; margin-right: 4px; }
.fplus { color: var(--t3); font-weight: 400; opacity: 0; transition: opacity .35s ease; }
.fplus.vis { opacity: 1; }
.ft { display: inline-block; padding: 2px 5px; border-radius: 4px; font-style: italic; font-size: 16px; opacity: 0; transform: translateY(6px); transition: all .4s ease; }
.ft.vis { opacity: 1; transform: translateY(0); }
.ft.pair-blue  { background: var(--blue-bg);  color: var(--blue); }
.ft.pair-green { background: var(--green-bg); color: var(--green); }
.ft.pair-amber { background: var(--amber-bg); color: var(--amber); }
.ft.pair-coral { background: var(--coral-bg); color: var(--coral); }
.formula-subst { text-align: center; padding: 6px 0 2px; animation: hintIn .4s ease; }
.formula-subst-label { font-size: 11px; color: var(--teal); font-weight: 500; background: var(--teal-bg); display: inline-block; padding: 3px 10px; border-radius: 6px; }
.formula-play { display: flex; align-items: center; gap: 6px; margin: 10px auto 0; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--t2); font-size: 11px; font-weight: 500; font-family: inherit; cursor: pointer; transition: all .15s; }
.formula-play:hover { border-color: var(--purple); color: var(--purple); background: var(--purple-bg); }
.formula-playing { color: var(--t3); }

/* ═══ Solution ═══ */
.solution { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
.sol-line { font-size: 15px; line-height: 2; color: var(--t1); font-weight: 500; opacity: 0; transform: translateX(-8px); transition: all .4s ease; }
.sol-line.vis { opacity: 1; transform: translateX(0); }
.sol-prefix { color: var(--t3); font-weight: 400; margin-right: 4px; }
.sol-final { font-weight: 700; }
.sol-answer { display: inline-block; background: var(--green-bg); color: var(--green); padding: 2px 10px; border-radius: 6px; font-weight: 700; font-size: 17px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="practice-app-v3.jsx"></script>
