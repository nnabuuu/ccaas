<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><title>课堂观察台 v7 · Teacher Console</title>
<link rel="stylesheet" href="colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{height:100vh;overflow:hidden;display:flex;flex-direction:column}

.hcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 13px;display:flex;flex-direction:column;gap:4px}
.hcard.warn{border-color:rgba(122,77,14,.2);background:var(--amber-bg)}
.hcard.good{border-color:rgba(45,102,18,.15);background:var(--green-bg)}
.hcard-lb{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.hcard.warn .hcard-lb{color:var(--amber)}
.hcard.good .hcard-lb{color:var(--green)}
.hcard-v{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1;color:var(--t1)}
.hcard-sub{font-size:10px;color:var(--t2);line-height:1.4}
.hcard-sub strong{color:var(--t1);font-weight:600}

@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes sig-pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes gentle-pulse{0%,100%{box-shadow:0 0 0 0 rgba(148,41,41,.15)}50%{box-shadow:0 0 0 4px rgba(148,41,41,.08)}}

:root{
  --border-strong:rgba(28,28,26,.14);
  --green-dot:#5a9a3a;
  --amber-dot:#c48a1e;
  --ai-dot:#7a72b5;
  --teal-soft:var(--teal-bg);
  --blue-soft:var(--blue-bg);
  --green-soft:var(--green-bg);
  --amber-soft:var(--amber-bg);
  --red-soft:var(--red-bg);
  --ai-soft:var(--purple-bg);
  --ai:var(--purple);
}
</style>
</head><body>
<div id="root"></div>
<script type="text/babel" src="teacher-v5-data.jsx"></script>
<script type="text/babel" src="teacher-v7-sidebar.jsx"></script>
<script type="text/babel" src="teacher-v7-main.jsx"></script>
<script type="text/babel" src="teacher-v7-signals.jsx"></script>
<script type="text/babel" src="teacher-v5-discuss.jsx"></script>
<script type="text/babel" src="teacher-v7-app.jsx"></script>
</body></html>
