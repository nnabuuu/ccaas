<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Creator v6 · 课程项目</title>
<link rel="stylesheet" href="colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
html,body{margin:0;height:100%;overflow:hidden}
body{font-family:"Plus Jakarta Sans",-apple-system,"PingFang SC",sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums}
#root{height:100vh;display:flex;flex-direction:column}
::selection{background:var(--purple-bg);color:var(--purple)}
.scr{overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.12) transparent}
.scr::-webkit-scrollbar{width:6px}.scr::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px}
input[type="range"]{height:4px;-webkit-appearance:none;appearance:none;background:var(--surface2);border-radius:2px;outline:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--t1);cursor:pointer;border:2px solid var(--surface);box-shadow:0 1px 3px rgba(0,0,0,.15)}
@keyframes aiBlink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes aiDot{0%,100%{opacity:.3}50%{opacity:1}}

/* Primary tabs — used by right working area */
.v6-tabs{display:flex;gap:0;padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.v6-tab{display:flex;align-items:center;gap:5px;padding:9px 14px;font-size:11px;font-weight:500;color:var(--t3);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;white-space:nowrap}
.v6-tab:hover{color:var(--t2)}
.v6-tab.active{color:var(--t1);font-weight:600;border-bottom-color:var(--t1)}
.v6-tab .vt-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.v6-tab-sep{width:1px;height:16px;background:var(--border);margin:8px 4px;flex-shrink:0}

/* File popover */
.v6-file-pop{position:absolute;top:100%;left:0;width:280px;max-height:420px;background:var(--surface);border:1px solid var(--border);border-radius:10px;z-index:120;display:flex;flex-direction:column;overflow:hidden;margin-top:4px}
.v6-fp-cat{padding:10px 12px 4px;font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px;cursor:pointer}
.v6-fp-file{display:flex;align-items:center;gap:8px;padding:5px 10px;margin:1px 6px;border-radius:6px;cursor:pointer;transition:all .1s}
.v6-fp-file:hover{background:var(--surface2)}

/* ── Toast notifications ── */
.v6-toast-wrap{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column-reverse;gap:6px;pointer-events:none}
.v6-toast{padding:8px 16px;border-radius:8px;font-size:11px;font-weight:500;animation:toastIn .22s ease;pointer-events:auto;display:flex;align-items:center;gap:8px;background:var(--surface);color:var(--t1);border:1px solid var(--border)}
.v6-toast.success{background:var(--green-bg);color:var(--green);border-color:rgba(45,102,18,.15)}
.v6-toast.warn{background:var(--amber-bg);color:var(--amber);border-color:rgba(196,138,30,.15)}
@keyframes toastIn{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
/* ── Editor slide-in ── */
.v6-editor-slide{animation:edSlideIn .22s ease both}
@keyframes edSlideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
/* ── Block navigation pulse ── */
.v6-block-pulse{animation:blockPulse .5s ease 2}
@keyframes blockPulse{0%,100%{box-shadow:none}50%{box-shadow:inset 0 0 0 2px var(--blue),0 0 0 3px var(--blue-bg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="creator-shared.jsx"></script>
<script type="text/babel" src="creator-v4-data.jsx"></script>
<script type="text/babel" src="creator-v3-plan.jsx"></script>
<script type="text/babel" src="creator-v3-content.jsx"></script>
<script type="text/babel" src="creator-v2-observe.jsx"></script>
<script type="text/babel" src="creator-v3-views.jsx"></script>
<script type="text/babel" src="creator-v6-ai-left.jsx"></script>
<script type="text/babel" src="creator-v6-exec.jsx"></script>
<script type="text/babel" src="creator-v6-skills.jsx"></script>
<script type="text/babel" src="creator-v6-app.jsx"></script>
<script type="text/babel">
ReactDOM.createRoot(document.getElementById('root')).render(<CreatorV6App />);
</script>
</body>
</html>
