<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Board · Ideal Beauty (viewer)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&display=swap');

:root{
  --bg:#f4f3ef; --surface:#fbfaf7; --surface2:#edece7;
  --t1:#1c1c1a; --t2:#5c5b56; --t3:#9c9a92;
  --border:rgba(28,28,26,.07); --border-strong:rgba(28,28,26,.14);
  --blue:#1f4a7a;  --blue-bg:#e4ecf4;
  --green:#0d5245; --green-bg:#dfece8;
  --amber:#7a4d0e; --amber-bg:#f6edda;
  --red:#8a2a1f;   --red-bg:#f4dfdb;
  --purple:#3a3185;--purple-bg:#e9e7f3;
  --teal:#0d5245;  --teal-bg:#dfece8;
  --hand:'Caveat',cursive;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Plus Jakarta Sans",-apple-system,"PingFang SC",sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}

/* ─────────── Lesson chrome ─────────── */
.lesson-bar{display:flex;align-items:center;gap:12px;padding:12px 22px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.lb-title{font-size:15px;font-weight:700;letter-spacing:-.2px}
.lb-sub{font-size:12px;color:var(--t3)}
.lb-spacer{flex:1}
.lb-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);padding:4px 10px;border:1px solid var(--border);border-radius:20px}

/* ─────────── Reveal scrubber ─────────── */
.scrub{display:flex;align-items:center;gap:14px;padding:10px 22px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.scrub-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t3)}
.scrub-steps{display:flex;align-items:center;gap:4px;flex:1}
.scrub-step{display:flex;align-items:baseline;gap:3px}
.scrub-step-num{font-size:11px;font-weight:700;color:var(--t3);min-width:14px;text-align:right;font-variant-numeric:tabular-nums}
.scrub-dots{display:flex;gap:3px;padding:0 4px 0 2px}
.scrub-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--t3);font-weight:700;transition:all .15s;font-variant-numeric:tabular-nums}
.scrub-dot:hover{border-color:var(--t2);color:var(--t2)}
.scrub-dot.done{background:var(--t1);border-color:var(--t1);color:var(--surface)}
.scrub-dot.cur{background:var(--green);border-color:var(--green);color:#fff;transform:scale(1.15);box-shadow:0 0 0 3px rgba(13,82,69,.18)}
.scrub-divider{color:var(--t3);font-size:10px;padding:0 2px}
.scrub-ctrls{display:flex;gap:6px;align-items:center}
.scrub-btn{font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--t2);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:4px}
.scrub-btn:hover{border-color:var(--t2);color:var(--t1)}
.scrub-btn.pri{background:var(--t1);color:var(--surface);border-color:var(--t1)}
.scrub-btn.pri:hover{opacity:.85;color:var(--surface)}
.scrub-pos{font-size:11px;color:var(--t3);font-variant-numeric:tabular-nums;min-width:50px;text-align:right;font-weight:600}

/* ─────────── Board canvas ─────────── */
.board-stage{flex:1;padding:24px 22px 60px;overflow-y:auto;background:
  radial-gradient(circle at 30% 20%, rgba(28,28,26,.018) 0, transparent 40%),
  radial-gradient(circle at 70% 60%, rgba(28,28,26,.018) 0, transparent 40%),
  var(--bg)
}
.board-root{max-width:1320px;margin:0 auto;display:flex;flex-direction:column;gap:28px}

/* ─────────── Step section ─────────── */
.step-section{display:flex;flex-direction:column;gap:14px;padding:20px 22px 26px;background:var(--surface);border:1px solid var(--border);border-radius:16px;position:relative}
.step-section.current{border-color:rgba(13,82,69,.3);box-shadow:0 2px 12px -6px rgba(13,82,69,.18)}
.step-banner{display:flex;align-items:baseline;gap:12px;padding-bottom:10px;border-bottom:2px solid var(--t1);margin-bottom:2px}
.step-banner-num{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t2);background:var(--surface2);padding:4px 10px;border-radius:20px}
.step-section.current .step-banner-num{background:var(--green);color:#fff}
.step-banner-label{font-size:17px;font-weight:800;color:var(--t1);letter-spacing:-.2px}
.step-banner-sep{flex:1}

/* full-bleed row */
.fullbleed-row{display:grid;grid-template-columns:repeat(12,1fr);gap:12px 14px}

/* columns layout */
.columns{display:grid;gap:0;position:relative;align-items:stretch}
.column{display:flex;flex-direction:column;padding:10px 18px 4px;position:relative;min-width:0}
.column + .column::before{
  content:'';position:absolute;left:-1px;top:6px;bottom:6px;width:0;
  border-left:2px dashed rgba(28,28,26,.18);
}
/* Chalk-style column header: typographic signpost, no fill, just an ink underline */
.col-hd{margin-bottom:14px;padding-bottom:6px;display:flex;align-items:baseline;gap:10px;position:relative}
.col-hd::after{content:'';position:absolute;left:0;right:18%;bottom:0;height:1.5px;background:var(--t1);border-radius:1px}
.col-title{font-family:var(--hand);font-size:24px;font-weight:700;color:var(--t1);letter-spacing:.3px;line-height:1}
.col-subtitle{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
/* Column tones collapse to ink — the board itself is neutral; only blocks carry accent */
.column.tone-cool .col-title,
.column.tone-warm .col-title,
.column.tone-accent .col-title,
.column.tone-muted .col-title{color:var(--t1)}
.col-body{display:grid;grid-template-columns:repeat(12,1fr);gap:12px 10px;align-content:start;flex:1}
.col-empty{grid-column:1 / span 12;font-size:11px;color:var(--t3);font-style:italic;text-align:center;padding:20px 0;border:1px dashed var(--border);border-radius:8px;opacity:.6}

/* single-column fallback (no layout defined) */
.board-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px 16px}

/* the cell wrapper handles geometry; the kind root handles appearance */
.bk-cell{min-width:0;opacity:1;transition:opacity .3s,transform .3s}
.bk-cell.entering{opacity:0;transform:translateY(6px)}
.bk-cell.just-revealed{animation:revealPop .55s cubic-bezier(.2,.8,.2,1.1) both}
@keyframes revealPop{0%{opacity:0;transform:translateY(10px) scale(.96)}60%{opacity:1;transform:translateY(0) scale(1.02)}100%{opacity:1;transform:scale(1)}}

/* ─────────── Block base ─────────── */
.bk{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;display:flex;flex-direction:column;gap:8px}

/* tones — applied via .tone-* */
.tone-neutral{}
.tone-accent{background:var(--green-bg);border-color:rgba(13,82,69,.2)}
.tone-warm{background:var(--amber-bg);border-color:rgba(122,77,14,.2)}
.tone-cool{background:var(--blue-bg);border-color:rgba(31,74,122,.18)}
.tone-muted{background:var(--surface);border-color:var(--border);border-style:dashed}
.tone-success{background:var(--green-bg);border-color:rgba(13,82,69,.3)}

/* shared atoms */
.sig{background:rgba(13,82,69,.12);color:var(--green);padding:0 4px;border-radius:3px;font-weight:600}

/* ─────────── heading ─────────── */
.bk-heading{padding:18px 22px}
.bk-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3)}
.bk-h-text{font-size:26px;font-weight:800;letter-spacing:-.4px;color:var(--t1);line-height:1.2}
.bk-h-accent{font-size:13px;color:var(--t2);font-weight:500}

/* ─────────── quote ─────────── */
.bk-quote{padding:14px 18px 14px 20px;position:relative}
.bk-quote::before{content:'';position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:2px;background:var(--t3)}
.bk-quote.tone-cool::before{background:var(--blue)}
.bk-quote.tone-accent::before{background:var(--green)}
.bk-quote.tone-warm::before{background:var(--amber)}
.bk-q-para{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.bk-q-text{font-size:15px;line-height:1.55;color:var(--t1);font-style:italic}

/* ─────────── chip-row ─────────── */
.bk-chiprow{flex-direction:row;flex-wrap:wrap;gap:8px;align-items:center;padding:14px 18px}
.bk-chip{display:inline-flex;align-items:baseline;gap:6px;padding:7px 12px;border-radius:18px;background:var(--surface);border:1px solid var(--border);font-size:13px;font-weight:600;color:var(--t1)}
.bk-chip.tone-cool{background:var(--blue-bg);border-color:rgba(31,74,122,.25);color:var(--blue)}
.bk-chip.tone-accent{background:var(--green-bg);border-color:rgba(13,82,69,.3);color:var(--green)}
.bk-chip.tone-warm{background:var(--amber-bg);border-color:rgba(122,77,14,.3);color:var(--amber)}
.bk-chip-text{font-style:italic}
.bk-chip-note{font-size:10px;font-weight:500;opacity:.7;font-style:normal}

/* ─────────── flow ─────────── */
.bk-flow{flex-direction:row;align-items:stretch;gap:0;padding:18px 18px;overflow-x:auto}
.bk-flow-card{flex:1;min-width:120px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:14px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:4px}
.bk-flow-card.tone-accent{background:var(--green-bg);border-color:rgba(13,82,69,.35)}
.bk-flow-card.tone-cool{background:var(--blue-bg);border-color:rgba(31,74,122,.3)}
.bk-flow-para{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}
.bk-flow-card.tone-accent .bk-flow-para{color:var(--green)}
.bk-flow-card.tone-cool .bk-flow-para{color:var(--blue)}
.bk-flow-label{font-size:18px;font-weight:700;color:var(--t1);letter-spacing:-.2px}
.bk-flow-card.tone-accent .bk-flow-label{color:var(--green)}
.bk-flow-card.tone-cool .bk-flow-label{color:var(--blue)}
.bk-flow-sub{font-size:11px;color:var(--t2);font-weight:500}
.bk-flow-arrow{display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--t3);font-weight:300;padding:0 6px}

/* ─────────── matrix ─────────── */
.bk-matrix{padding:0;overflow:hidden}
.bk-mx{width:100%;border-collapse:collapse;font-size:13px}
.bk-mx th{text-align:left;padding:10px 14px;background:var(--surface2);font-weight:600;color:var(--t2);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.bk-mx td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.45}
.bk-mx tr:last-child td{border-bottom:none}
.bk-mx-row.mx-demo{background:rgba(13,82,69,.045)}
.bk-mx-row.mx-demo .bk-mx-val{font-weight:600}
.bk-mx-cell{position:relative}
.bk-mx-val{color:var(--t1);font-weight:500;display:block}
.bk-mx-empty{color:var(--t3);font-style:italic;display:block}
.bk-mx-note{display:block;font-size:10px;color:var(--t3);margin-top:3px;font-weight:500;letter-spacing:.2px}
.mark-sig .bk-mx-val{background:rgba(13,82,69,.1);color:var(--green);padding:1px 5px;border-radius:3px;display:inline-block}
.mark-warn .bk-mx-empty{color:var(--amber);font-weight:600;font-style:normal}
.mark-warn .bk-mx-note,.mark-sig .bk-mx-note{color:var(--amber)}
.mark-err .bk-mx-val{color:var(--red);text-decoration:line-through}
.mark-ok .bk-mx-val{color:var(--green)}

/* ─────────── mindmap ─────────── */
.bk-mindmap{padding:18px 20px}
.bk-mm-grid{display:grid;grid-template-columns:1fr 1.4fr 1fr;grid-template-rows:auto auto;gap:18px 28px;align-items:stretch;position:relative}
.bk-mm-center{grid-column:2;grid-row:1 / span 2;background:var(--green);color:#fff;border-radius:14px;padding:20px 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6px;box-shadow:0 4px 16px -6px rgba(13,82,69,.4)}
.bk-mm-c-label{font-size:24px;font-weight:800;letter-spacing:-.3px}
.bk-mm-c-note{font-size:12px;opacity:.85;font-weight:500}
.bk-mm-branch{background:var(--surface);border:1.5px solid rgba(13,82,69,.25);border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:6px;position:relative}
.bk-mm-branch:nth-of-type(1){grid-column:1;grid-row:1}
.bk-mm-branch:nth-of-type(2){grid-column:3;grid-row:1}
.bk-mm-branch:nth-of-type(3){grid-column:1 / span 3;grid-row:2;flex-direction:row;flex-wrap:wrap;align-items:baseline;gap:8px 14px}
.bk-mm-b-label{font-size:13px;font-weight:700;color:var(--green);letter-spacing:-.1px}
.bk-mm-leaves{list-style:none;display:flex;flex-direction:column;gap:3px;font-size:12px;color:var(--t2);line-height:1.4}
.bk-mm-branch:nth-of-type(3) .bk-mm-leaves{flex-direction:row;flex-wrap:wrap;gap:4px 12px}
.bk-mm-leaves li{position:relative;padding-left:12px}
.bk-mm-leaves li::before{content:'·';position:absolute;left:3px;top:-2px;color:var(--t3);font-weight:700}

/* ─────────── compare — asymmetric (claim vs evidence) ─────────── */
.bk-compare{flex-direction:row;align-items:stretch;gap:0;padding:0;overflow:hidden;background:var(--surface);border-color:var(--border-strong)}
.bk-cmp-side{flex:1;padding:16px 20px;display:flex;flex-direction:column;gap:10px;background:transparent}
/* LEFT = the claim under interrogation — muted, quoted, tentative */
.bk-cmp-side:first-child{background:transparent;color:var(--t2)}
.bk-cmp-side:first-child .bk-cmp-label{color:var(--t3);font-weight:600}
.bk-cmp-side:first-child .bk-cmp-list{color:var(--t2)}
.bk-cmp-side:first-child .bk-cmp-list li{font-style:italic;opacity:.85}
.bk-cmp-side:first-child .bk-cmp-list li::before{content:'“';color:var(--t3);top:0;font-style:normal;font-size:14px}
/* RIGHT = the evidence — ink-black, solid, confident */
.bk-cmp-side:last-child{background:var(--surface2);color:var(--t1)}
.bk-cmp-side:last-child .bk-cmp-label{color:var(--t1);font-weight:800}
.bk-cmp-side:last-child .bk-cmp-list li{color:var(--t1);font-weight:500}
.bk-cmp-side:last-child .bk-cmp-list li::before{content:'•';color:var(--t1);top:-2px;font-size:16px;line-height:1}
.bk-cmp-side:last-child .bk-cmp-list li b,
.bk-cmp-side:last-child .bk-cmp-list li strong{font-weight:700}
/* shared atoms */
.bk-cmp-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.bk-cmp-list{list-style:none;display:flex;flex-direction:column;gap:5px;font-size:14px;line-height:1.5}
.bk-cmp-list li{padding-left:16px;position:relative}
.bk-cmp-vs{display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--hand);font-size:30px;font-weight:700;color:var(--t1);padding:0 14px;background:transparent;position:relative;line-height:1;gap:2px}
.bk-cmp-vs::before{content:'?';position:absolute;top:14px;font-size:14px;color:var(--t3);font-family:inherit}
.bk-cmp-vs::after{content:'';position:absolute;top:50%;left:50%;width:1px;height:60%;background:var(--border-strong);z-index:-1}
.bk-cmp-vs-legacy{display:flex;align-items:center;justify-content:center;font-family:var(--hand);font-size:32px;font-weight:700;color:var(--t1);padding:0 6px;background:var(--surface);border-left:1px dashed var(--border);border-right:1px dashed var(--border)}

/* ─────────── annotation ─────────── */
.bk-anno{flex-direction:row;align-items:flex-start;gap:10px;padding:12px 16px}
.bk-anno-ic{font-size:16px;line-height:1.4;flex-shrink:0}
.bk-anno-text{font-size:13px;line-height:1.6;color:var(--t1);font-family:var(--hand);font-weight:600;letter-spacing:.2px}
.anno-warning .bk-anno-text{color:var(--amber)}
.anno-warning{background:var(--amber-bg);border-color:rgba(122,77,14,.25)}
.anno-aha{background:var(--green-bg);border-color:rgba(13,82,69,.3)}
.anno-aha .bk-anno-text{color:var(--green)}

/* ─────────── student-work ─────────── */
.bk-stu{padding:14px 16px;gap:8px;position:relative;border-style:solid;border-width:1.5px}
.bk-stu.stu-celebrate{border-color:var(--green);background:var(--green-bg)}
.bk-stu.stu-redo{border-color:var(--amber);background:var(--amber-bg)}
.bk-stu-hd{display:flex;align-items:baseline;gap:8px;justify-content:space-between}
.bk-stu-author{font-size:13px;font-weight:700;color:var(--t1)}
.bk-stu-status{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t3)}
.bk-stu.stu-celebrate .bk-stu-status{color:var(--green)}
.bk-stu.stu-redo .bk-stu-status{color:var(--amber)}
.bk-stu-text{font-family:var(--hand);font-size:17px;line-height:1.4;color:var(--t1);font-weight:600;letter-spacing:.2px}

/* ─────────── formula ─────────── */
.bk-formula{padding:16px 20px;gap:6px}
.bk-fm-expr{font-family:'Georgia',serif;font-size:16px;font-weight:600;color:var(--green);line-height:1.4;letter-spacing:.1px}
.bk-fm-cap{font-size:11px;color:var(--t3);font-weight:500}

/* ─────────── divider ─────────── */
.bk-divider{padding:6px 0;display:flex;align-items:center;gap:10px;background:transparent;border:none;border-radius:0}
.bk-divider::before,.bk-divider::after{content:'';flex:1;height:1px;background:var(--border-strong)}
.bk-div-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px}

/* image */
.bk-image{padding:0;overflow:hidden}
.bk-image img{width:100%;height:auto;display:block}
.bk-image-ph{padding:32px 16px;background:repeating-linear-gradient(45deg,var(--surface2) 0 8px,transparent 8px 16px);border-style:dashed}
.bk-img-ph-inner{font-size:11px;color:var(--t3);text-align:center;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* unknown */
.bk-unknown{background:var(--red-bg);color:var(--red);font-size:11px;padding:10px}
</style>
</head>
<body>

<div class="lesson-bar">
  <div>
    <div class="lb-title" id="lessonTitle">Ideal Beauty</div>
    <div class="lb-sub" id="lessonSub">高一(3)班 · 阅读策略训练</div>
  </div>
  <div class="lb-spacer"></div>
  <div class="lb-tag">板书 · Viewer</div>
</div>

<div class="scrub">
  <div class="scrub-label">揭示进度</div>
  <div class="scrub-steps" id="scrubSteps"></div>
  <div class="scrub-pos" id="scrubPos">1.0</div>
  <div class="scrub-ctrls">
    <button class="scrub-btn" onclick="prevReveal()">‹ 上一</button>
    <button class="scrub-btn pri" onclick="nextReveal()">下一 ›</button>
    <button class="scrub-btn" onclick="resetReveal()">↺ 重置</button>
    <button class="scrub-btn" onclick="revealAll()">全部展示</button>
  </div>
</div>

<div class="board-stage" id="stage"></div>

<script src="board-data.js?v=2"></script>
<script src="board-renderer.js?v=2"></script>
<script>
(function(){
  var board = window.IDEAL_BEAUTY_BOARD;
  var stage = document.getElementById('stage');

  // pointer = current reveal position (step, sub) — show all blocks at-or-before
  // start at 1.0 (only the first block of step 1 visible) for dramatic reveal demo
  var pointer = JSON.parse(localStorage.getItem('boardPointer') || 'null') || { step: 1, sub: 1 };
  var lastPointer = null;

  // ordered list of all (step,sub) keys actually used by this board
  function timeline(){
    var seen = {};
    var keys = [];
    board.blocks.forEach(function(b){
      var k = b.reveal.step*1000 + b.reveal.sub;
      if (!seen[k]){ seen[k]=true; keys.push(b.reveal); }
    });
    keys.sort(function(a,b){ return (a.step*1000+a.sub)-(b.step*1000+b.sub); });
    return keys;
  }
  var TL = timeline();

  function pIdx(){
    return TL.findIndex(function(t){ return t.step===pointer.step && t.sub===pointer.sub; });
  }
  function pKey(p){ return p.step + '.' + p.sub; }

  function renderBoard(justRevealedId){
    var grid = window.BoardRenderer.render(board, pointer, { justRevealedId: justRevealedId });
    stage.innerHTML = '';
    stage.appendChild(grid);
    document.getElementById('scrubPos').textContent = pKey(pointer) + ' (' + (pIdx()+1) + '/' + TL.length + ')';
    renderScrubber();
    localStorage.setItem('boardPointer', JSON.stringify(pointer));
  }

  function renderScrubber(){
    var el = document.getElementById('scrubSteps');
    el.innerHTML = '';
    // group TL keys by step
    var byStep = {};
    TL.forEach(function(t){ (byStep[t.step] = byStep[t.step] || []).push(t); });
    var steps = Object.keys(byStep).map(Number).sort(function(a,b){return a-b});
    steps.forEach(function(stepNum, i){
      var stepDef = board.steps.find(function(s){ return s.idx === stepNum; }) || { label: '?' };
      var wrap = document.createElement('div');
      wrap.className = 'scrub-step';
      wrap.title = 'Step ' + stepNum + ' · ' + stepDef.label;
      var num = document.createElement('span');
      num.className = 'scrub-step-num';
      num.textContent = stepNum + '.';
      wrap.appendChild(num);
      var dots = document.createElement('div');
      dots.className = 'scrub-dots';
      byStep[stepNum].forEach(function(t){
        var d = document.createElement('div');
        d.className = 'scrub-dot';
        d.textContent = t.sub;
        var k = t.step*1000 + t.sub;
        var pk = pointer.step*1000 + pointer.sub;
        if (k < pk) d.classList.add('done');
        if (k === pk) d.classList.add('cur');
        d.onclick = function(){ pointer = { step: t.step, sub: t.sub }; renderBoard(); };
        dots.appendChild(d);
      });
      wrap.appendChild(dots);
      el.appendChild(wrap);
      if (i < steps.length-1){
        var sep = document.createElement('span');
        sep.className = 'scrub-divider';
        sep.textContent = '·';
        el.appendChild(sep);
      }
    });
  }

  window.nextReveal = function(){
    var i = pIdx();
    if (i < TL.length - 1){
      pointer = TL[i+1];
      // find block(s) that reveal exactly at this point — animate the first
      var newId = (board.blocks.find(function(b){ return b.reveal.step===pointer.step && b.reveal.sub===pointer.sub; })||{}).id;
      renderBoard(newId);
    }
  };
  window.prevReveal = function(){
    var i = pIdx();
    if (i > 0){ pointer = TL[i-1]; renderBoard(); }
  };
  window.resetReveal = function(){ pointer = TL[0]; renderBoard(); };
  window.revealAll = function(){ pointer = TL[TL.length-1]; renderBoard(); };

  // keyboard shortcuts
  document.addEventListener('keydown', function(e){
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextReveal(); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); prevReveal(); }
    else if (e.key === 'Home') { e.preventDefault(); resetReveal(); }
    else if (e.key === 'End') { e.preventDefault(); revealAll(); }
  });

  // populate lesson bar
  document.getElementById('lessonTitle').textContent = board.lesson.title;
  document.getElementById('lessonSub').textContent = (board.lesson.subtitle || '') + (board.lesson.class ? ' · ' + board.lesson.class : '');

  renderBoard();

  // ─── cross-surface sync shim ───
  window.addEventListener('message', function(e){
    var d = e.data || {};
    if (d.type === 'sync' && typeof d.step === 'number') {
      // conductor step (0-4) → board step (1-5), land on last sub of that step
      var target = d.step + 1;
      var sub = 1;
      TL.forEach(function(t){ if (t.step === target) sub = Math.max(sub, t.sub); });
      pointer = { step: target, sub: sub };
      renderBoard();
    }
    if (d.type === 'reveal') {
      if (d.dir === 'next') window.nextReveal();
      else if (d.dir === 'prev') window.prevReveal();
      else if (d.dir === 'reset') window.resetReveal();
      else if (d.dir === 'all') window.revealAll();
    }
  });
  // embed mode — hide chrome
  if (/[?&]embed=1/.test(location.search)) {
    document.querySelector('.lesson-bar').style.display = 'none';
    document.querySelector('.scrub').style.display = 'none';
    document.body.style.background = '#1c1c1a';
    var bs = document.querySelector('.board-stage');
    bs.style.background = '#f4f3ef';
    bs.style.padding = '18px 20px 32px';
    // ensure board fits iframe width (1400) without horizontal overflow
    var st = document.createElement('style');
    st.textContent = '.board-root{max-width:100%!important;padding:0 4px}'+
                     '.step-section{padding:16px 16px 20px;border-radius:12px}'+
                     '.step-banner-label{font-size:15px}'+
                     '.column{padding:10px 12px 4px}'+
                     '.columns{gap:0}'+
                     '.bk-h-text{font-size:22px}'+
                     '.bk-q-text{font-size:14px}'+
                     '.col-title{font-size:20px}';
    document.head.appendChild(st);
  }
  try { window.parent && window.parent.postMessage({type:'ready', role:'board'}, '*'); } catch(e){}
})();
</script>
</body>
</html>
