<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Select Evidence · Skim Task Practice</title>
<link rel="stylesheet" href="colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body{
    font-family:"Plus Jakarta Sans",-apple-system,"PingFang SC",sans-serif;
    background:var(--bg);color:var(--t1);
    -webkit-font-smoothing:antialiased;
    margin:0;min-height:100vh;
  }
  .stage{max-width:780px;margin:0 auto;padding:36px 28px 120px}
  .preface{margin-bottom:28px;color:var(--t2)}
  .preface .eyebrow{font-size:10px;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
  .preface h1{font-size:24px;font-weight:700;letter-spacing:-.4px;color:var(--t1);margin:0 0 8px}
  .preface p{font-size:13px;line-height:1.7;margin:0;color:var(--t2)}
  .meta-pill{display:inline-flex;align-items:center;gap:6px;font-size:10px;padding:3px 8px;background:var(--surface2);border-radius:3px;color:var(--t2);font-weight:500;margin-right:6px}
  .section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);padding:0 0 10px;display:flex;align-items:center;gap:8px;margin-top:32px}
  .section-line{flex:1;height:1px;background:var(--border)}
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="select-evidence-app.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
