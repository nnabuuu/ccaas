<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>精准教学平台 · 创作中心</title>
<link rel="stylesheet" href="colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
html,body{margin:0;height:100%;overflow:hidden}
body{font-family:"Plus Jakarta Sans",-apple-system,"PingFang SC",sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums}
#root{height:100vh;display:flex;flex-direction:column}
::selection{background:var(--purple-bg);color:var(--purple)}
.scr{overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.12) transparent}
.scr::-webkit-scrollbar{width:6px}.scr::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px}
@keyframes aiBlink{0%,100%{opacity:1}50%{opacity:.3}}

/* Toast notifications */
.v6-toast-wrap{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column-reverse;gap:6px;pointer-events:none}
.v6-toast{padding:8px 16px;border-radius:8px;font-size:11px;font-weight:500;animation:toastIn .22s ease;pointer-events:auto;display:flex;align-items:center;gap:8px;background:var(--surface);color:var(--t1);border:1px solid var(--border)}
.v6-toast.success{background:var(--green-bg);color:var(--green);border-color:rgba(45,102,18,.15)}
.v6-toast.warn{background:var(--amber-bg);color:var(--amber);border-color:rgba(196,138,30,.15)}
@keyframes toastIn{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes tplSlideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="creator-shared.jsx"></script>
<script type="text/babel" src="creator-v4-data.jsx"></script>
<script type="text/babel" src="creator-v6-skills.jsx"></script>
<script type="text/babel" src="creator-templates.jsx"></script>
<script type="text/babel" src="platform-home-tpl-detail.jsx"></script>
<script type="text/babel" src="platform-home-app.jsx"></script>
<script type="text/babel">
ReactDOM.createRoot(document.getElementById('root')).render(<PlatformHome />);
</script>
</body>
</html>
