<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Article Analyzer - Empty State</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "secondary-container": "#acbfff",
                      "on-error": "#ffffff",
                      "on-primary-fixed": "#00174b",
                      "primary": "#004ac6",
                      "on-background": "#191b23",
                      "surface-container-lowest": "#ffffff",
                      "on-secondary": "#ffffff",
                      "on-secondary-fixed-variant": "#31447b",
                      "surface-bright": "#faf8ff",
                      "on-secondary-fixed": "#00174b",
                      "surface-container-low": "#f3f3fe",
                      "tertiary-fixed-dim": "#ffb596",
                      "primary-fixed": "#dbe1ff",
                      "surface-tint": "#0053db",
                      "tertiary": "#943700",
                      "surface-container-high": "#e7e7f3",
                      "tertiary-fixed": "#ffdbcd",
                      "surface": "#faf8ff",
                      "error-container": "#ffdad6",
                      "error": "#ba1a1a",
                      "on-tertiary-fixed-variant": "#7d2d00",
                      "on-primary-fixed-variant": "#003ea8",
                      "outline-variant": "#c3c6d7",
                      "background": "#faf8ff",
                      "surface-dim": "#d9d9e5",
                      "secondary-fixed-dim": "#b4c5ff",
                      "on-tertiary-container": "#ffede6",
                      "surface-container-highest": "#e1e2ed",
                      "inverse-on-surface": "#f0f0fb",
                      "surface-container": "#ededf9",
                      "on-tertiary-fixed": "#360f00",
                      "on-surface-variant": "#434655",
                      "on-primary-container": "#eeefff",
                      "inverse-primary": "#b4c5ff",
                      "surface-variant": "#e1e2ed",
                      "inverse-surface": "#2e3039",
                      "tertiary-container": "#bc4800",
                      "secondary": "#495c95",
                      "primary-container": "#2563eb",
                      "on-tertiary": "#ffffff",
                      "on-secondary-container": "#394c84",
                      "on-primary": "#ffffff",
                      "on-surface": "#191b23",
                      "primary-fixed-dim": "#b4c5ff",
                      "outline": "#737686",
                      "secondary-fixed": "#dbe1ff",
                      "on-error-container": "#93000a"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Inter"],
                      "body": ["Inter"],
                      "label": ["Inter"]
              }
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-gradient {
            background: linear-gradient(135deg, #004ac6 0%, #2563eb 100%);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased">
<!-- TopNavBar -->
<nav class="bg-[#faf8ff] dark:bg-slate-950 flex justify-between items-center w-full px-8 py-4 max-w-screen-2xl mx-auto top-0 sticky z-50">
<div class="flex items-center gap-2">
<span class="text-2xl font-black text-[#191b23] dark:text-slate-100 font-headline">Article Analyzer</span>
</div>
<div class="hidden md:flex gap-8 items-center">
<a class="text-[#2563eb] dark:text-blue-400 font-bold border-b-2 border-[#2563eb] pb-1 font-inter text-lg tracking-tight" href="#">Library</a>
<a class="text-[#434655] dark:text-slate-400 font-medium hover:text-[#2563eb] dark:hover:text-blue-300 transition-colors duration-200 font-inter text-lg tracking-tight" href="#">Analysis</a>
<a class="text-[#434655] dark:text-slate-400 font-medium hover:text-[#2563eb] dark:hover:text-blue-300 transition-colors duration-200 font-inter text-lg tracking-tight" href="#">History</a>
<a class="text-[#434655] dark:text-slate-400 font-medium hover:text-[#2563eb] dark:hover:text-blue-300 transition-colors duration-200 font-inter text-lg tracking-tight" href="#">Settings</a>
</div>
<div class="flex items-center gap-4">
<button class="active:opacity-80 transition-opacity p-2 rounded-full hover:bg-surface-container-high">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="dark_mode">dark_mode</span>
</button>
</div>
</nav>
<!-- Main Content Area -->
<main class="min-h-[calc(100vh-80px)] flex items-center justify-center px-6">
<div class="max-w-3xl w-full flex flex-col items-center text-center">
<!-- Asymmetric Decorative Element (The Curator's Touch) -->
<div class="relative w-64 h-64 mb-12 flex items-center justify-center">
<!-- Tonal layered backgrounds instead of borders -->
<div class="absolute inset-0 bg-surface-container rounded-[2rem] rotate-6 opacity-40"></div>
<div class="absolute inset-0 bg-surface-container-high rounded-[2rem] -rotate-3 opacity-60"></div>
<!-- Central Illustration Component -->
<div class="relative z-10 bg-surface-container-lowest p-10 rounded-2xl shadow-[0_12px_32px_-4px_rgba(25,27,35,0.06)] flex flex-col items-center">
<div class="w-20 h-24 border-t-4 border-primary rounded-t-sm bg-surface-container-low flex flex-col p-3 gap-2 overflow-hidden">
<div class="w-full h-1 bg-outline-variant/30 rounded-full"></div>
<div class="w-3/4 h-1 bg-outline-variant/30 rounded-full"></div>
<div class="w-full h-1 bg-outline-variant/30 rounded-full"></div>
<div class="w-1/2 h-1 bg-outline-variant/30 rounded-full"></div>
</div>
<div class="absolute -bottom-2 -right-2 bg-primary-fixed p-3 rounded-full text-on-primary-fixed">
<span class="material-symbols-outlined text-3xl" data-icon="book_5">book_5</span>
</div>
</div>
</div>
<!-- Typography Hierarchy -->
<h1 class="text-5xl font-black text-on-surface tracking-tight mb-4 font-headline">No articles yet</h1>
<p class="text-xl text-on-surface-variant max-w-md leading-relaxed mb-10 font-body">
                Your article library is empty. Start your first analysis to see editorial insights, sentiment analysis, and structural reports here.
            </p>
<!-- Primary Action with Signature Gradient -->
<button class="editorial-gradient text-on-primary px-8 py-4 rounded-xl font-semibold flex items-center gap-3 transition-transform active:scale-95 shadow-lg shadow-primary/20 hover:brightness-110">
<span class="material-symbols-outlined font-bold" data-icon="add">add</span>
<span class="text-lg">Create Article</span>
</button>
<!-- Secondary Prompt -->
<div class="mt-16 pt-8 border-t border-outline-variant/10 w-full max-w-sm">
<p class="text-sm text-on-surface-variant/60 font-medium uppercase tracking-widest label-md mb-6">Need inspiration?</p>
<div class="grid grid-cols-2 gap-4">
<button class="bg-surface-container hover:bg-surface-container-high transition-all p-4 rounded-xl text-left flex flex-col gap-2 group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform" data-icon="auto_stories">auto_stories</span>
<span class="text-sm font-semibold text-on-surface">Import News</span>
</button>
<button class="bg-surface-container hover:bg-surface-container-high transition-all p-4 rounded-xl text-left flex flex-col gap-2 group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform" data-icon="upload_file">upload_file</span>
<span class="text-sm font-semibold text-on-surface">Upload PDF</span>
</button>
</div>
</div>
</div>
</main>
<!-- Insight Float (Specialized Component) -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-auto min-w-[320px]">
<div class="bg-surface-bright/80 backdrop-blur-[20px] rounded-full px-6 py-3 flex items-center justify-between gap-8 outline outline-1 outline-outline-variant/15 shadow-xl">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<span class="text-sm font-medium text-on-surface-variant">System Status: Ready</span>
</div>
<div class="flex items-center gap-4 text-sm text-on-surface-variant/60">
<span>v2.4.0</span>
<span class="material-symbols-outlined text-lg" data-icon="help_outline">help_outline</span>
</div>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -right-[5%] w-[30%] h-[30%] bg-tertiary/5 blur-[120px] rounded-full"></div>
</div>
</body></html>
